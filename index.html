<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="System">
<title>System — Daily Quests</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Solo Leveling palette */
  --bg:#04060f;
  --bg2:#080d1a;
  --bg3:#0d1528;
  --bg4:#111e35;
  --brd:#1a2a4a;
  --brd2:#243558;
  --txt:#c8d8f0;
  --txt2:#7a9bc4;
  --mut:#3a5070;

  --cyan:#00d4ff;
  --cyan2:#0099cc;
  --cyan3:rgba(0,212,255,.12);
  --blue:#3d7fff;
  --blue2:rgba(61,127,255,.15);
  --pur:#8b5cf6;
  --pur2:rgba(139,92,246,.15);
  --gld:#f5c842;
  --gld2:rgba(245,200,66,.12);
  --red:#ff3d5a;
  --red2:rgba(255,61,90,.12);
  --org:#ff8c42;
  --grn:#00e5a0;
  --grn2:rgba(0,229,160,.12);

  --fnt:'Rajdhani',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --shadow-cyan:0 0 20px rgba(0,212,255,.25);
  --shadow-gld:0 0 20px rgba(245,200,66,.2);
  --shadow-pur:0 0 20px rgba(139,92,246,.25);
}

body{font-family:var(--fnt);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;font-weight:500}
button{font-family:var(--fnt);cursor:pointer;font-weight:600}

/* Particle canvas background */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4}
#app{position:relative;z-index:1}

/* GROUP COLORS — Solo Leveling inspired */
.gc0{--gc:#00d4ff;--gcbg:rgba(0,212,255,.08)}
.gc1{--gc:#8b5cf6;--gcbg:rgba(139,92,246,.08)}
.gc2{--gc:#f5c842;--gcbg:rgba(245,200,66,.08)}
.gc3{--gc:#ff8c42;--gcbg:rgba(255,140,66,.08)}
.gc4{--gc:#00e5a0;--gcbg:rgba(0,229,160,.08)}
.gc5{--gc:#ff3d5a;--gcbg:rgba(255,61,90,.08)}
.gc6{--gc:#3d7fff;--gcbg:rgba(61,127,255,.08)}
.gc7{--gc:#c084fc;--gcbg:rgba(192,132,252,.08)}

/* HEADER */
.hdr{background:linear-gradient(180deg,rgba(8,13,26,.98) 0%,rgba(4,6,15,.95) 100%);border-bottom:1px solid var(--brd);padding:12px 16px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.5}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sys-title{font-size:10px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono)}
.sys-title::before{content:'[ ';color:var(--mut)}.sys-title::after{content:' ]';color:var(--mut)}
.hdate{color:var(--mut);font-size:11px;font-family:var(--mono)}

.rank-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rank-badge{display:flex;align-items:center;gap:8px}
.rank-letter{width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--pur),var(--blue));box-shadow:var(--shadow-pur);color:#fff;flex-shrink:0}
.rank-info .rank-name{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:.5px}
.rank-info .rank-sub{font-size:10px;color:var(--mut);font-family:var(--mono)}
.lvl-display{text-align:right}
.lvl-num{font-size:22px;font-weight:700;color:var(--cyan);line-height:1;text-shadow:0 0 10px rgba(0,212,255,.4)}
.lvl-lbl{font-size:9px;color:var(--mut);font-family:var(--mono);letter-spacing:1px}

.xp-section{margin-bottom:8px}
.xp-top{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);font-family:var(--mono);margin-bottom:4px}
.xp-top span:first-child{color:var(--cyan)}
.xpbar{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.12);border-radius:2px;height:6px;overflow:hidden;position:relative}
.xpfill{background:linear-gradient(90deg,var(--blue),var(--cyan));height:100%;border-radius:2px;transition:width .6s ease;position:relative}
.xpfill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:6px;background:rgba(255,255,255,.6);filter:blur(2px)}

.stats-row{display:flex;gap:0;border:1px solid var(--brd);border-radius:4px;overflow:hidden}
.stat-pill{flex:1;padding:5px 4px;text-align:center;background:var(--bg3);border-right:1px solid var(--brd);font-size:10px}
.stat-pill:last-child{border-right:none}
.stat-pill .sv{font-size:14px;font-weight:700;display:block;line-height:1.2}
.stat-pill .sl{font-size:8px;color:var(--mut);font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.sv-streak{color:var(--org)}
.sv-mul{color:var(--gld)}
.sv-xp{color:var(--cyan)}
.sv-day{color:var(--pur)}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--brd);position:relative}
.tabs::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.2),transparent)}
.tab{flex:1;padding:10px 1px;text-align:center;font-size:11px;font-weight:600;color:var(--mut);border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan);text-shadow:0 0 8px rgba(0,212,255,.5)}

.content{padding:12px 16px 90px;min-height:300px}

/* DAY NAV */
.daynav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dnbtn{background:rgba(0,212,255,.06);border:1px solid var(--brd);color:var(--cyan);font-size:13px;padding:5px 12px;border-radius:3px;transition:all .15s}
.dnbtn:active{background:rgba(0,212,255,.15)}
.today-btn{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.3);color:var(--cyan);font-size:10px;padding:4px 8px;border-radius:3px;font-family:var(--mono);letter-spacing:.5px}
.today-btn:active{background:rgba(0,212,255,.2)}
.daytitle{font-size:13px;font-weight:700;color:var(--txt);text-align:center;letter-spacing:.3px}
.todaytag{background:rgba(0,212,255,.15);color:var(--cyan);font-size:9px;padding:2px 5px;border-radius:2px;margin-left:4px;font-family:var(--mono);border:1px solid rgba(0,212,255,.3)}

/* PROGRESS BOX */
.progbox{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--brd);border-radius:6px;padding:12px;margin-bottom:12px;position:relative;overflow:hidden}
.progbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.3}
.progtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progcount{font-size:24px;font-weight:700;color:var(--cyan);text-shadow:0 0 10px rgba(0,212,255,.3);line-height:1}
.progcount small{font-size:13px;color:var(--mut);font-weight:500}
.progpts{text-align:right}
.progptsval{font-size:20px;font-weight:700;color:var(--gld);text-shadow:0 0 8px rgba(245,200,66,.3);line-height:1}
.progptslbl{font-size:9px;color:var(--mut);font-family:var(--mono);letter-spacing:.5px}
.progtrack{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.08);border-radius:2px;height:5px;overflow:hidden}
.progfill{background:linear-gradient(90deg,var(--blue),var(--cyan));height:100%;border-radius:2px;transition:width .5s ease;position:relative}
.progfill.full{background:linear-gradient(90deg,var(--grn),var(--cyan))}

/* PERFECT DAY */
.perfect-banner{background:linear-gradient(135deg,rgba(0,229,160,.1),rgba(0,212,255,.1));border:1px solid rgba(0,229,160,.3);border-radius:6px;padding:10px 14px;margin-bottom:10px;text-align:center;animation:glow-perfect 2s ease-in-out infinite}
@keyframes glow-perfect{0%,100%{box-shadow:0 0 10px rgba(0,229,160,.2)}50%{box-shadow:0 0 20px rgba(0,229,160,.4)}}
.perfect-banner .pb-title{color:var(--grn);font-size:14px;font-weight:700;letter-spacing:1px}
.perfect-banner .pb-sub{color:var(--txt2);font-size:11px;margin-top:2px}

/* GROUPS */
.grpwrap{margin-bottom:10px}
.grptitle{font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center;padding:8px 11px;border-radius:4px 4px 0 0;background:linear-gradient(135deg,var(--gcbg),rgba(0,0,0,.2));color:var(--gc);border-left:2px solid var(--gc);cursor:pointer;user-select:none;letter-spacing:.8px;text-transform:uppercase;border-top:1px solid var(--brd);border-right:1px solid var(--brd);border-bottom:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.grptitle:hover{filter:brightness(1.1)}
.grp-arrow{font-size:9px;transition:transform .25s;display:inline-block;margin-left:4px;opacity:.7}
.grp-body{overflow:hidden;transition:max-height .3s ease;padding-top:5px}

/* TASK ITEM */
.ti{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--brd);border-radius:4px;padding:10px 10px 10px 12px;margin-bottom:4px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;transition:all .15s;border-left:2px solid var(--gc,var(--brd2));position:relative;overflow:hidden}
.ti::before{content:'';position:absolute;inset:0;opacity:0;background:linear-gradient(135deg,rgba(0,212,255,.04),transparent);transition:opacity .15s}
.ti:active::before{opacity:1}
.ti:active{border-color:var(--brd2)}
.ti.done{opacity:.4}
.ti.done .tiname{text-decoration:line-through;color:var(--mut)}
.ti.overdue{border-left:2px solid var(--red)!important;background:linear-gradient(135deg,rgba(255,61,90,.04),var(--bg2))}
.ti.hasmalus{border-left:2px solid var(--org)!important}
.ti.archived{opacity:.25;border-style:dashed}

.task-streak{font-size:10px;color:var(--org);font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px;font-family:var(--mono)}

/* CHECKBOX */
.chk{width:18px;height:18px;border:1px solid var(--brd2);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:11px;color:var(--cyan);transition:all .2s;background:rgba(0,212,255,.03)}
.ti.done .chk{background:rgba(0,212,255,.15);border-color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.2)}
.chk.pop{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.6)}70%{transform:scale(.9)}100%{transform:scale(1)}}

.chk-counter{min-width:38px;height:26px;border:1px solid rgba(245,200,66,.3);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700;color:var(--gld);background:rgba(245,200,66,.06);padding:0 6px;white-space:nowrap;font-family:var(--mono)}
.chk-counter.reached{background:rgba(0,229,160,.12);color:var(--grn);border-color:var(--grn);box-shadow:0 0 8px rgba(0,229,160,.2)}

/* TASK BODY */
.tibody{flex:1;min-width:0}
.tiname{font-size:14px;color:var(--txt);margin-bottom:5px;word-break:break-word;letter-spacing:.2px}
.tinote{font-size:11px;color:var(--mut);margin-bottom:5px;line-height:1.4;font-family:var(--mono)}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 6px;border-radius:2px;font-family:var(--mono);letter-spacing:.3px;font-weight:600;text-transform:uppercase}
.ttime{background:rgba(61,127,255,.12);color:var(--blue)}
.tpts{background:rgba(245,200,66,.1);color:var(--gld)}
.tdiff{background:rgba(139,92,246,.12);color:var(--pur)}
.trecur{background:rgba(0,229,160,.1);color:var(--grn)}
.tprio{background:rgba(255,140,66,.1);color:var(--org)}
.tover{background:rgba(255,61,90,.1);color:var(--red)}
.tbonus{background:rgba(0,229,160,.1);color:var(--grn)}
.texcl{background:rgba(0,212,255,.1);color:var(--cyan)}

/* TASK ACTIONS */
.tiacts{display:flex;gap:2px;flex-shrink:0}
.abtn{background:none;border:none;font-size:14px;padding:4px;line-height:1;opacity:.5;transition:opacity .15s}
.abtn:active{opacity:1}
.abtn.edit{color:var(--blue)}.abtn.del{color:var(--mut)}.abtn.arch{color:var(--pur)}
.drag-handle{color:var(--mut);font-size:11px;cursor:grab;padding:3px 1px;flex-shrink:0;margin-top:3px;opacity:.3}
.ti.dragging{opacity:.2;border-style:dashed}.ti.drag-over{border-top:2px solid var(--cyan)!important}

/* SUBTASKS */
.subtask-wrap{padding:3px 0 3px 28px}
.sti{background:rgba(0,212,255,.03);border:1px solid var(--brd);border-radius:3px;padding:6px 10px;margin-bottom:3px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s}
.sti:active{background:rgba(0,212,255,.08)}
.sti.done .stiname{text-decoration:line-through;color:var(--mut)}
.schk{width:14px;height:14px;border:1px solid var(--brd2);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--cyan)}
.sti.done .schk{background:rgba(0,212,255,.15);border-color:var(--cyan)}
.stiname{font-size:12px;color:var(--txt2);flex:1}
.sti-pts{font-size:10px;color:var(--gld);font-family:var(--mono)}

/* COUNTER */
.counter-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.cnt-btn{background:rgba(0,212,255,.06);border:1px solid var(--brd);color:var(--cyan);font-size:18px;width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;transition:all .15s}
.cnt-btn:active{background:rgba(0,212,255,.2);box-shadow:0 0 10px rgba(0,212,255,.2)}
.cnt-track{flex:1;background:rgba(245,200,66,.06);border:1px solid rgba(245,200,66,.1);border-radius:2px;height:5px;overflow:hidden}
.cnt-fill{background:linear-gradient(90deg,var(--blue),var(--gld));height:100%;border-radius:2px;transition:width .3s}
.cnt-fill.done-fill{background:linear-gradient(90deg,var(--grn),var(--cyan))}

/* WEEK VIEW */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.wday{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:5px 3px;text-align:center;cursor:pointer;min-height:58px;transition:all .2s}
.wday.wtoday{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.15)}
.wday.wsel{background:var(--bg4);border-color:var(--blue)}
.wday-lbl{font-size:8px;color:var(--mut);margin-bottom:2px;font-family:var(--mono)}
.wday-num{font-size:13px;font-weight:700;margin-bottom:3px}
.wday.wtoday .wday-num{color:var(--cyan);text-shadow:0 0 8px rgba(0,212,255,.4)}
.wday-bar{width:80%;margin:0 auto 2px;background:rgba(255,255,255,.04);border-radius:1px;height:3px;overflow:hidden}
.wday-bar-fill{background:var(--blue);height:100%;border-radius:1px}
.wday-bar-fill.wfull{background:var(--cyan)}
.wday-pts{font-size:8px;color:var(--gld);font-family:var(--mono)}

/* MONTH VIEW */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.month-day-lbl{font-size:9px;color:var(--mut);text-align:center;padding:4px 0;font-family:var(--mono);letter-spacing:.5px}
.mday{background:var(--bg3);border:1px solid var(--brd);border-radius:3px;padding:4px 3px;text-align:center;cursor:pointer;min-height:44px;transition:all .15s}
.mday.mtoday{border-color:var(--cyan);box-shadow:0 0 6px rgba(0,212,255,.15)}
.mday.msel{background:var(--bg4);border-color:var(--blue)}
.mday.mfuture{opacity:.3}.mday.mempty{opacity:.2}
.mday-num{font-size:11px;font-weight:700;margin-bottom:2px}
.mday.mtoday .mday-num{color:var(--cyan)}
.mday-bar{width:80%;margin:0 auto 2px;background:rgba(255,255,255,.04);border-radius:1px;height:2px;overflow:hidden}
.mday-pts{font-size:8px;color:var(--gld);font-family:var(--mono)}

/* BADGES */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.badge{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:12px 6px;text-align:center;transition:all .2s}
.badge.unlocked{border-color:rgba(245,200,66,.4);background:rgba(245,200,66,.04);box-shadow:0 0 12px rgba(245,200,66,.1)}
.badge.locked{opacity:.25;filter:grayscale(1)}
.badge-icon{font-size:24px;margin-bottom:4px}
.badge-name{font-size:10px;font-weight:700;color:var(--txt2);margin-bottom:2px;letter-spacing:.3px}
.badge-desc{font-size:9px;color:var(--mut);line-height:1.3}
.badge.unlocked .badge-name{color:var(--gld)}

/* TEMPLATES */
.tpl-row{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.tpl-name{font-size:13px;color:var(--txt);font-weight:700;letter-spacing:.3px}
.tpl-sub{font-size:10px;color:var(--mut);margin-top:2px;font-family:var(--mono)}
.tpl-acts{display:flex;gap:6px;flex-shrink:0}
.tpl-btn{background:none;border:1px solid var(--brd);color:var(--mut);font-size:11px;padding:4px 8px;border-radius:3px;font-family:var(--fnt);font-weight:600;transition:all .15s}
.tpl-btn.apply{color:var(--cyan);border-color:rgba(0,212,255,.3)}.tpl-btn:active{opacity:.7}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.scard{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:12px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--gc,transparent);opacity:.3}
.scardlbl{font-size:9px;color:var(--mut);margin-bottom:4px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.scardval{font-size:24px;font-weight:700}
.rankbanner{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(0,212,255,.08));border:1px solid rgba(139,92,246,.3);border-radius:6px;padding:14px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 0 20px rgba(139,92,246,.1)}
.rankbanner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pur),transparent)}
.rankname{color:var(--gld);font-size:22px;font-weight:700;letter-spacing:1px;text-shadow:0 0 10px rgba(245,200,66,.3)}
.ranksub{color:var(--txt2);font-size:10px;margin-top:4px;font-family:var(--mono)}
.slabel{font-size:9px;color:var(--mut);margin-bottom:8px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
.slabel::before{content:'▸ ';color:var(--cyan)}
.stabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.stab{padding:4px 8px;font-size:10px;font-weight:600;color:var(--mut);border:1px solid var(--brd);border-radius:3px;background:none;letter-spacing:.5px;text-transform:uppercase;font-family:var(--fnt);transition:all .15s}
.stab.on{color:var(--cyan);border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.06);box-shadow:0 0 8px rgba(0,212,255,.1)}
.chartbox{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:12px;margin-bottom:12px}
.chartbars{display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:4px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.barfill{width:100%;background:rgba(255,255,255,.04);border-radius:2px 2px 0 0;min-height:3px;transition:height .5s}
.barfill.cur{background:linear-gradient(0deg,var(--blue),var(--cyan))}
.barfill.act{background:rgba(0,212,255,.25)}
.barlbl{font-size:9px;color:var(--mut);font-family:var(--mono)}
.barv{font-size:9px;color:var(--gld);min-height:12px;font-family:var(--mono)}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.hc{aspect-ratio:1;border-radius:2px;background:rgba(255,255,255,.03)}
.hc.l1{background:rgba(0,212,255,.15)}.hc.l2{background:rgba(0,212,255,.35)}.hc.l3{background:rgba(0,212,255,.6)}.hc.l4{background:var(--cyan)}
.heatleg{display:flex;gap:6px;align-items:center;font-size:10px;color:var(--mut);font-family:var(--mono)}
.heatleg .hc{width:12px;height:12px;aspect-ratio:unset}
.srow2{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:8px 12px;margin-bottom:4px}
.srow2-bar{width:2px;height:20px;flex-shrink:0;background:var(--gc,var(--mut));border-radius:1px;margin-right:10px;box-shadow:0 0 6px var(--gc,transparent)}
.srow2-name{font-size:12px;color:var(--txt);flex:1}
.srow2-val{font-size:12px;font-weight:700;color:var(--org);font-family:var(--mono)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--mut);font-size:13px}
.emptycmd{color:var(--cyan);font-size:16px;margin-bottom:10px;font-family:var(--mono);letter-spacing:.5px}
.emptycmd::before{content:'> ';opacity:.5}

/* FAB */
.fab{position:fixed;bottom:24px;right:16px;width:54px;height:54px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:var(--bg);border:none;border-radius:50%;font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,212,255,.4),0 4px 15px rgba(0,0,0,.4);z-index:50;transition:transform .1s}
.fab:active{transform:scale(.9)}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:flex-end;backdrop-filter:blur(4px)}
.moverlay.open{display:flex}
.modal{background:linear-gradient(180deg,var(--bg4),var(--bg2));border:1px solid var(--brd2);border-radius:12px 12px 0 0;padding:20px 16px 36px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.4}
.mtitle{color:var(--cyan);font-size:15px;font-weight:700;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase;font-family:var(--fnt)}
.mtitle::before{content:'[ ';color:var(--mut)}.mtitle::after{content:' ]';color:var(--mut)}
.flbl{font-size:10px;color:var(--mut);margin-bottom:5px;display:block;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase}
.finput{width:100%;background:rgba(0,212,255,.03);border:1px solid var(--brd);color:var(--txt);font-family:var(--fnt);font-size:13px;padding:10px 11px;border-radius:4px;outline:none;-webkit-appearance:none;margin-bottom:11px;transition:border-color .15s;font-weight:500}
.finput:focus{border-color:rgba(0,212,255,.4);background:rgba(0,212,255,.05);box-shadow:0 0 10px rgba(0,212,255,.08)}
textarea.finput{resize:none;min-height:58px;line-height:1.5;font-family:var(--mono)}
.frow{display:flex;gap:8px}.frow .fld{flex:1}
.ptspreview{background:rgba(245,200,66,.04);border:1px solid rgba(245,200,66,.15);border-radius:4px;padding:8px 11px;font-size:11px;color:var(--mut);margin-bottom:14px;font-family:var(--mono)}
.ptspreview span{color:var(--gld);font-weight:700}
.btnrow{display:flex;gap:8px;margin-top:2px}
.btn{flex:1;padding:12px;font-family:var(--fnt);font-size:13px;border-radius:4px;font-weight:700;border:none;letter-spacing:.5px;text-transform:uppercase;transition:all .15s}
.btnok{background:linear-gradient(135deg,var(--blue),var(--cyan));color:var(--bg);box-shadow:0 0 15px rgba(0,212,255,.25)}
.btnok:active{transform:scale(.97)}
.btncancel{background:rgba(255,255,255,.04);color:var(--mut);border:1px solid var(--brd)!important}
.btnred{background:rgba(255,61,90,.1);color:var(--red);border:1px solid rgba(255,61,90,.3)!important}

/* TOGGLE */
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;padding:10px 11px;background:rgba(0,212,255,.03);border:1px solid var(--brd);border-radius:4px}
.toggle-lbl{font-size:12px;color:var(--txt);font-weight:600}.toggle-sub{font-size:10px;color:var(--mut);margin-top:2px;font-family:var(--mono)}
.toggle{position:relative;width:42px;height:23px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:rgba(255,255,255,.04);border:1px solid var(--brd);border-radius:12px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:17px;height:17px;left:2px;bottom:2px;background:var(--mut);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:rgba(0,212,255,.15);border-color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.2)}
.toggle input:checked+.toggle-slider:before{transform:translateX(19px);background:var(--cyan)}
.section-sep{height:1px;background:linear-gradient(90deg,transparent,var(--brd),transparent);margin:14px 0 12px}
.fsect{font-size:10px;color:var(--cyan);margin-bottom:10px;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--mono)}
.fsect::before{content:'// ';color:var(--mut)}
.sti-edit-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}

/* NOTIF */
.notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--bg4),var(--bg3));border:1px solid rgba(0,212,255,.3);color:var(--cyan);padding:9px 20px;border-radius:4px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center;box-shadow:0 0 20px rgba(0,212,255,.2);font-family:var(--mono);letter-spacing:.5px}
.notif.show{opacity:1}
.notif.warn{border-color:rgba(255,140,66,.4);color:var(--org);box-shadow:0 0 20px rgba(255,140,66,.2)}
.notif.bonus{border-color:rgba(245,200,66,.4);color:var(--gld);box-shadow:0 0 20px rgba(245,200,66,.3)}
.notif.perfect{border-color:rgba(0,229,160,.4);color:var(--grn);box-shadow:0 0 20px rgba(0,229,160,.3)}

/* BADGE POPUP */
.badge-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);background:linear-gradient(135deg,var(--bg4),var(--bg3));border:2px solid rgba(245,200,66,.4);border-radius:12px;padding:28px 36px;text-align:center;z-index:300;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 0 40px rgba(245,200,66,.2),0 20px 60px rgba(0,0,0,.6)}
.badge-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.bp-icon{font-size:52px;margin-bottom:10px;filter:drop-shadow(0 0 12px rgba(245,200,66,.4))}
.bp-title{color:var(--gld);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.bp-name{color:var(--txt);font-size:14px;font-weight:700}

/* EXPORT BOX */
.export-box{background:rgba(0,212,255,.03);border:1px solid var(--brd);border-radius:4px;padding:12px;margin-bottom:10px}
.export-box p{font-size:11px;color:var(--mut);margin-bottom:10px;line-height:1.5;font-family:var(--mono)}
.export-warn{background:rgba(255,61,90,.06);border:1px solid rgba(255,61,90,.2);border-radius:4px;padding:8px 10px;font-size:11px;color:var(--red);margin-bottom:10px;line-height:1.5;font-family:var(--mono)}

/* MANAGE */
.manage-ti{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:10px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:8px;border-left:2px solid var(--gc,var(--brd2))}
.manage-ti .tibody .tiname{font-size:13px}

/* CONFETTI */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;z-index:400;pointer-events:none;animation:confetti-fall 1.2s ease-out forwards}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(300px) rotate(720deg);opacity:0}}
</style>

<body>
<canvas id="particles"></canvas>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="sys-title" id="sys-rank-lbl">SYSTEM</div>

  <div class="bp-icon" id="bpop-icon"></div>
  <div class="bp-title">Succès débloqué</div>
  <div class="bp-name" id="bpop-name"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────
const DIFFS={facile:1,normal:1.5,difficile:2,'extrême':3};
const PRIOS={basse:1,normale:1.2,haute:1.5,critique:2};
const RANKS=[
  {name:'Novice',    letter:'E', color:'#7a9bc4'},
  {name:'Apprenti',  letter:'D', color:'#00e5a0'},
  {name:'Explorateur',letter:'C',color:'#3d7fff'},
  {name:'Guerrier',  letter:'B', color:'#8b5cf6'},
  {name:'Champion',  letter:'A', color:'#f5c842'},
  {name:'Héros',     letter:'S', color:'#ff8c42'},
  {name:'Légende',   letter:'SS',color:'#ff3d5a'},
  {name:'Maître',    letter:'SSS',color:'#00d4ff'},
];
const XPL=500,MALUS=0.2;
const GCOLS=['gc0','gc1','gc2','gc3','gc4','gc5','gc6','gc7'];
const SK='lrpg8';
const STREAK_MULS=[
  {min:0,  mul:1.0,  label:null},
  {min:3,  mul:1.1,  label:'×1.1'},
  {min:7,  mul:1.25, label:'×1.25'},
  {min:14, mul:1.5,  label:'×1.5'},
  {min:30, mul:1.75, label:'×1.75'},
  {min:60, mul:2.0,  label:'×2.0'},
];
const BADGE_DEFS=[
  {id:'first',   icon:'🌱',name:'Premier pas',      desc:'1ère quête complétée',    check:s=>s.totalDone>=1},
  {id:'streak3', icon:'✨',name:'3 jours de suite', desc:'Streak de 3 jours',       check:s=>s.streak>=3},
  {id:'week1',   icon:'🔥',name:'7 jours de feu',   desc:'Streak de 7 jours',       check:s=>s.streak>=7},
  {id:'month1',  icon:'🌙',name:'Mois de légende',  desc:'Streak de 30 jours',      check:s=>s.streak>=30},
  {id:'lvl5',    icon:'⚔️',name:'Rang B',            desc:'Atteindre le niveau 5',   check:s=>s.lvl>=5},
  {id:'lvl8',    icon:'👑',name:'Rang S',            desc:'Atteindre le niveau 8',   check:s=>s.lvl>=8},
  {id:'q10',     icon:'📜',name:'Collectionneur',    desc:'10 quêtes complétées',    check:s=>s.totalDone>=10},
  {id:'q50',     icon:'⚡',name:'Infatigable',       desc:'50 quêtes complétées',    check:s=>s.totalDone>=50},
  {id:'q100',    icon:'💎',name:'Centurion',         desc:'100 quêtes complétées',   check:s=>s.totalDone>=100},
  {id:'xp1000',  icon:'🏆',name:'1000 XP',           desc:'Atteindre 1000 XP',       check:s=>s.xp>=1000},
  {id:'xp5000',  icon:'🌟',name:'Légende vivante',   desc:'Atteindre 5000 XP',       check:s=>s.xp>=5000},
  {id:'subtask', icon:'🧩',name:'Architecte',        desc:'1ère sous-tâche faite',   check:s=>s.subDone>=1},
  {id:'perfect', icon:'🎯',name:'Journée parfaite',  desc:'100% un jour',            check:s=>s.hadPerfect},
  {id:'tpl',     icon:'📋',name:'Organisateur',      desc:'Template utilisé',        check:s=>s.usedTpl},
  {id:'cnt10',   icon:'💧',name:'Bien hydraté',      desc:'10 unités compteur / jour',check:s=>s.maxDayCnt>=10},
];

// ── STATE ──────────────────────────────────────────────
let tasks=[],comps={},counters={},subcomps={},nid=1;
let curDay=tod(),curtab='today',curstab='semaine';
let gcMap={},collapsed={},templates=[],unlockedBadges=[],dragSrc=null;

// ── PARTICLES ──────────────────────────────────────────
(function initParticles(){
  const c=document.getElementById('particles');
  if(!c)return;
  const ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(let i=0;i<60;i++)pts.push({x:Math.random()*1000,y:Math.random()*1800,vx:(Math.random()-.5)*.3,vy:-Math.random()*.4-.1,r:Math.random()*1.5+.3,a:Math.random()});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.a-=.002;
      if(p.a<=0){p.x=Math.random()*W;p.y=H+10;p.a=Math.random()*.6+.2;p.vy=-Math.random()*.4-.1}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(0,180,255,'+p.a+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── UTILS ──────────────────────────────────────────────
function tod(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function dstr(d,s){const dt=new Date(d+'T12:00:00');return s?dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'}):dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}
function gc(name){if(!gcMap[name]){gcMap[name]=GCOLS[Object.keys(gcMap).length%GCOLS.length]}return gcMap[name]}
function getStreakMul(s){let m=STREAK_MULS[0];for(const x of STREAK_MULS){if(s>=x.min)m=x;}return m}
function getRankInfo(lvl){return RANKS[Math.min(lvl-1,RANKS.length-1)]}
function getLvl(xp){return Math.floor(xp/XPL)+1}

// ── CALCULS ────────────────────────────────────────────
function calcPts(t,rep,mul){
  let p;
  if(t.type==='counter'){const pu=Math.max(5,Math.round(((t.duration||15))/15)*5);p=Math.round(pu*(DIFFS[t.difficulty]||1)*(PRIOS[t.priority]||1))}
  else{const b=t.duration?Math.max(10,Math.round(t.duration/15)*10):10;p=Math.round(b*(DIFFS[t.difficulty]||1)*(PRIOS[t.priority]||1))}
  if(rep&&t.reportMalus)p=Math.round(p*(1-MALUS));
  if(mul&&mul>1)p=Math.round(p*mul);
  return p;
}
function bonusPts(t){if(t.type!=='counter'||!t.counterGoal)return 0;return Math.round(calcPts(t)*t.counterGoal*0.5)}
function isDone(day,id){return!!comps[day+'_'+id]}
function getCnt(day,id){return counters[day+'_'+id]||0}
function isSubDone(day,tid,sid){return!!subcomps[day+'_'+tid+'_'+sid]}

function rl(r){
  const p=parseRecur(r);if(!p)return '';
  if(p.unit==='j')return p.every===1?'quotidien':'×'+p.every+'j';
  if(p.unit==='s')return p.every===1?'hebdo':'×'+p.every+'sem';
  if(p.unit==='m')return p.every===1?'mensuel':'×'+p.every+'mois';
  return '';
}

// ── RÉCURRENCE ─────────────────────────────────────────
function parseRecur(r){
  if(!r||r==='aucune')return null;
  if(r==='quotidien')return {unit:'j',every:1};
  if(r==='hebdo')return {unit:'s',every:1};
  if(r==='mensuel')return {unit:'m',every:1};
  const m=r.match(/^(\d+)([jsm])$/);
  if(m)return {unit:m[2],every:parseInt(m[1])};
  // Legacy Xj format
  if(r.endsWith('j')&&!isNaN(parseInt(r)))return {unit:'j',every:parseInt(r)};
  return null;
}
function isWeekend(day){const d=new Date(day+'T12:00:00').getDay();return d===0||d===6}
function nextMonday(day){const d=new Date(day+'T12:00:00');const dow=d.getDay();const n=dow===1?0:dow===0?1:8-dow;d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}

function checkRecurOn(t,p,day){
  const base=new Date(t.scheduledDate+'T12:00:00'),cur=new Date(day+'T12:00:00');
  const diffDays=Math.round((cur-base)/86400000);
  if(diffDays<0)return false;
  if(p.unit==='j')return diffDays%p.every===0;
  if(p.unit==='s')return diffDays%(p.every*7)===0;
  if(p.unit==='m'){if(cur.getDate()!==base.getDate())return false;const months=(cur.getFullYear()-base.getFullYear())*12+(cur.getMonth()-base.getMonth());return months>=0&&months%p.every===0}
  return false;
}

function wasOn(t,day){
  if(!t.scheduledDate||t.scheduledDate>day)return false;
  const p=parseRecur(t.recurrence);
  if(!p)return t.scheduledDate===day;
  if(t.noWeekend&&isWeekend(day)){
    if(t.weekendMode==='report'){const mon=nextMonday(day);return mon===day?checkRecurOn(t,p,day):false}
    return false;
  }
  return checkRecurOn(t,p,day);
}
function donOn(t,day){return t.type==='counter'?getCnt(day,t.id)>=(t.counterGoal||1):isDone(day,t.id)}
function hasPast(t,day){
  if(!t.autoReport)return false;
  let d=new Date(day+'T12:00:00');d.setDate(d.getDate()-1);
  for(let i=0;i<60;i++){const ds=d.toISOString().slice(0,10);if(wasOn(t,ds))return !donOn(t,ds);d.setDate(d.getDate()-1)}
  return false;
}
function tasksForDay(day){
  return tasks.filter(t=>{
    if(t.archived||!t.scheduledDate||t.scheduledDate>day)return false;
    if(t.noWeekend&&t.weekendMode==='report'&&!isWeekend(day)){
      let d=new Date(day+'T12:00:00');
      for(let back=1;back<=2;back++){const prev=new Date(d);prev.setDate(d.getDate()-back);const ps=prev.toISOString().slice(0,10);if(isWeekend(ps)){const p=parseRecur(t.recurrence);if(p&&checkRecurOn(t,p,ps)&&nextMonday(ps)===day&&!donOn(t,ps))return true}}
    }
    if(wasOn(t,day))return true;
    if(t.autoReport&&t.recurrence&&t.recurrence!=='aucune')return hasPast(t,day);
    if((!t.recurrence||t.recurrence==='aucune')&&t.scheduledDate<day&&t.autoReport){
      let d=new Date(t.scheduledDate+'T12:00:00'),end=new Date(day+'T12:00:00');
      while(d<end){d.setDate(d.getDate()+1);const ds=d.toISOString().slice(0,10);if(ds<=day&&donOn(t,ds))return false}
      return true;
    }
    return false;
  });
}
function isRep(t,day){if(!t.reportMalus)return false;return !wasOn(t,day)&&(hasPast(t,day)||((!t.recurrence||t.recurrence==='aucune')&&t.scheduledDate<day))}

// ── POINTS ─────────────────────────────────────────────
function dayPts(day){
  const mul=getStreakMul(getStreak()).mul;let p=0;
  tasks.forEach(t=>{
    if(t.type==='counter'){const c=getCnt(day,t.id);if(c>0){p+=calcPts(t,false,mul)*c;if(t.counterGoal&&c>=t.counterGoal)p+=bonusPts(t)}}
    else if(isDone(day,t.id))p+=calcPts(t,isRep(t,day),mul);
  });
  tasks.forEach(t=>(t.subtasks||[]).forEach(st=>{if(isSubDone(day,t.id,st.id))p+=Math.round((st.pts||5)*mul)}));
  return Math.round(p);
}
function totalXP(){
  const mul=getStreakMul(getStreak()).mul;let xp=0;
  Object.keys(comps).forEach(k=>{if(!comps[k])return;const parts=k.split('_');const id=parseInt(parts[parts.length-1]);const day=parts.slice(0,-1).join('_');const t=tasks.find(t=>t.id===id&&t.type!=='counter');if(t)xp+=calcPts(t,isRep(t,day),mul)});
  Object.keys(counters).forEach(k=>{const c=counters[k];if(!c)return;const id=parseInt(k.split('_').pop());const t=tasks.find(t=>t.id===id&&t.type==='counter');if(t){xp+=calcPts(t,false,mul)*c;if(t.counterGoal&&c>=t.counterGoal)xp+=bonusPts(t)}});
  Object.keys(subcomps).forEach(k=>{if(!subcomps[k])return;const parts=k.split('_');const sid=parseInt(parts[parts.length-1]);const tid=parseInt(parts[parts.length-2]);const t=tasks.find(t=>t.id===tid);const st=t&&(t.subtasks||[]).find(s=>s.id===sid);if(st)xp+=Math.round((st.pts||5)*mul)});
  return Math.round(xp);
}
function getStreak(){
  let s=0;const today=tod();let d=new Date(today+'T12:00:00');
  for(let i=0;i<365;i++){const ds=d.toISOString().slice(0,10);const dt=tasksForDay(ds);if(dt.length===0){d.setDate(d.getDate()-1);continue}const done=dt.filter(t=>donOn(t,ds)).length;if(done===dt.length){s++;d.setDate(d.getDate()-1)}else{if(ds===today)d.setDate(d.getDate()-1);else break}}
  return s;
}
function taskStreak(t){
  let s=0;let d=new Date(tod()+'T12:00:00');
  for(let i=0;i<365;i++){const ds=d.toISOString().slice(0,10);if(wasOn(t,ds)){if(donOn(t,ds))s++;else if(ds===tod()){d.setDate(d.getDate()-1);continue}else break}d.setDate(d.getDate()-1)}
  return s;
}

// ── BADGES ─────────────────────────────────────────────
function getBadgeState(){
  const today=tod(),totalDone=Object.values(comps).filter(Boolean).length;
  const xp=totalXP(),streak=getStreak(),lvl=getLvl(xp);
  const subDone=Object.values(subcomps).filter(Boolean).length;
  let maxDayCnt=0;Object.keys(counters).forEach(k=>{if(counters[k]>maxDayCnt)maxDayCnt=counters[k]});
  let hadPerfect=false;
  for(let i=0;i<90;i++){const d=new Date(today+'T12:00:00');d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const dt=tasksForDay(ds);if(dt.length>0&&dt.every(t=>donOn(t,ds))){hadPerfect=true;break}}
  return {totalDone,xp,streak,lvl,subDone,maxDayCnt,hadPerfect,usedTpl:templates.some(t=>t.usedCount>0)};
}
function checkBadges(){
  const state=getBadgeState();const newBadges=[];
  BADGE_DEFS.forEach(b=>{if(!unlockedBadges.includes(b.id)&&b.check(state)){unlockedBadges.push(b.id);newBadges.push(b)}});
  if(newBadges.length){let i=0;const show=()=>{if(i>=newBadges.length)return;const b=newBadges[i++];document.getElementById('bpop-icon').textContent=b.icon;document.getElementById('bpop-name').textContent=b.name;const el=document.getElementById('bpop');el.classList.add('show');setTimeout(()=>{el.classList.remove('show');setTimeout(show,500)},2500)};setTimeout(show,500);persist()}
}

function load(){
  try{
    const keys=[SK,'lrpg7','lrpg6','lrpg5','lrpg4','liferPG_v3','liferPG_v2'];
    let s=null;for(const k of keys){s=localStorage.getItem(k);if(s)break}
    if(s){const d=JSON.parse(s);tasks=d.tasks||[];comps=d.comps||{};counters=d.counters||{};subcomps=d.subcomps||{};nid=d.nid||1;gcMap=d.gcMap||d.grpColorMap||{};collapsed=d.collapsed||d.collapsedGroups||{};templates=d.templates||[];unlockedBadges=d.unlockedBadges||[];persist()}

// ── MONTH ──────────────────────────────────────────────
function renderMonth(){
  const ref=new Date(curDay+'T12:00:00'),year=ref.getFullYear(),month=ref.getMonth();
  const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0),today=tod();
  let startOffset=firstDay.getDay()-1;if(startOffset<0)startOffset=6;
  const monthLabel=ref.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}).toUpperCase();
  let h='<div class="daynav">'
    +'<button class="dnbtn" onclick="chMonth(-1)">‹</button>'
    +'<div style="text-align:center"><div class="daytitle" style="font-size:12px;letter-spacing:1px;font-family:var(--mono)">'+monthLabel+'</div>'
    +(curDay!==today?'<button class="today-btn" onclick="goToday()" style="margin-top:4px">↩ Aujourd\'hui</button>':'')
    +'</div>'
    +'<button class="dnbtn" onclick="chMonth(1)">›</button>'
    +'</div><div class="month-grid">';
  ['Lu','Ma','Me','Je','Ve','Sa','Di'].forEach(d=>{h+='<div class="month-day-lbl">'+d+'</div>'});
  for(let i=0;i<startOffset;i++)h+='<div></div>';
  for(let day=1;day<=lastDay.getDate();day++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const dt=tasksForDay(ds),done=dt.filter(t=>donOn(t,ds)).length;
    const pts=dayPts(ds),pct=dt.length?done/dt.length:0,isFuture=ds>today,isEmpty=dt.length===0;
    const bc=pct>=1?'var(--cyan)':pct>=.5?'var(--gld)':pct>0?'var(--org)':'rgba(255,255,255,.04)';
    h+='<div class="mday'+(ds===today?' mtoday':'')+(ds===curDay?' msel':'')+(isFuture?' mfuture':'')+(isEmpty?' mempty':'')+'" onclick="selDay(\''+ds+'\')">'
      +'<div class="mday-num">'+day+'</div>'
      +'<div class="mday-bar"><div style="width:'+Math.round(pct*100)+'%;background:'+bc+';height:100%;border-radius:1px"></div></div>'
      +'<div class="mday-pts">'+(pts>0&&!isFuture?pts:'')+'</div>'
      +'</div>';
  }
  h+='</div><div style="display:flex;gap:10px;font-size:9px;color:var(--mut);margin-bottom:12px;font-family:var(--mono)">'
    +'<span style="color:var(--cyan)">■ 100%</span><span style="color:var(--gld)">■ 50%+</span><span style="color:var(--org)">■ en cours</span></div>';
  h+='<div class="slabel">'+dstr(curDay)+'</div>';

// ── STATS ──────────────────────────────────────────────
function renderStats(){
  const xp=totalXP(),lvl=getLvl(xp),xpInLvl=xp%XPL,streak=getStreak(),today=tod(),mul=getStreakMul(streak),rank=getRankInfo(lvl);
  const l7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const ds=d.toISOString().slice(0,10);return{ds,pts:dayPts(ds),lbl:d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,2)}});
  const mp=Math.max(...l7.map(x=>x.pts),1),wp=l7.reduce((a,b)=>a+b.pts,0);
  const doneAll=Object.values(comps).filter(Boolean).length+Object.values(counters).reduce((a,b)=>a+b,0);
  const l28=Array.from({length:28},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(27-i));const ds=d.toISOString().slice(0,10);const dt=tasksForDay(ds);const done=dt.filter(t=>donOn(t,ds)).length;const p=dt.length?done/dt.length:0;return p===0?'':p<.33?'l1':p<.66?'l2':p<1?'l3':'l4'});

  let h='<div class="rankbanner">'
    +'<div style="font-size:11px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:4px">Hunter Rank</div>'
    +'<div class="rankname" style="color:'+rank.color+'">[ '+rank.letter+' ] '+rank.name+'</div>'
    +'<div class="ranksub">Niveau '+lvl+' · '+xp+' XP total · '+Math.round(xpInLvl/XPL*100)+'% → LVL '+(lvl+1)+(mul.mul>1?' · Bonus '+mul.label:'')+'</div>'
    +'</div>'
    +'<div class="sgrid">'
    +'<div class="scard gc0"><div class="scardlbl">streak</div><div class="scardval" style="color:var(--org)">'+streak+'<span style="font-size:12px">j</span></div></div>'
    +'<div class="scard gc2"><div class="scardlbl">xp total</div><div class="scardval" style="color:var(--gld)">'+xp+'</div></div>'
    +'<div class="scard gc1"><div class="scardlbl">semaine</div><div class="scardval" style="color:var(--cyan)">'+wp+'</div></div>'
    +'<div class="scard gc7"><div class="scardlbl">actions</div><div class="scardval" style="color:var(--pur)">'+doneAll+'</div></div>'
    +'</div>'
    +'<div class="slabel">progression</div>'
    +'<div class="stabs">'
    +'<button class="stab'+(curstab==='semaine'?' on':'')+'" onclick="swtab(\'semaine\')">7j</button>'
    +'<button class="stab'+(curstab==='mois'?' on':'')+'" onclick="swtab(\'mois\')">28j</button>'
    +'<button class="stab'+(curstab==='streaks'?' on':'')+'" onclick="swtab(\'streaks\')">streaks</button>'
    +'<button class="stab'+(curstab==='badges'?' on':'')+'" onclick="swtab(\'badges\')">badges</button>'
    +'</div>';

  if(curstab==='semaine'){
    h+='<div class="chartbox"><div class="slabel" style="margin-bottom:8px">points / jour</div><div class="chartbars">';
    l7.forEach(x=>{const hp=Math.round(x.pts/mp*72),isT=x.ds===today;h+='<div class="barcol"><div class="barv">'+(x.pts>0?x.pts:'')+'</div><div class="barfill'+(isT?' cur':x.pts>0?' act':'')+'" style="height:'+hp+'px"></div><div class="barlbl">'+x.lbl+'</div></div>'});
    h+='</div></div>';
  } else if(curstab==='mois'){
    h+='<div class="chartbox"><div class="slabel" style="margin-bottom:8px">activité 28 jours</div><div class="heatmap">';
    l28.forEach(c=>{h+='<div class="hc '+c+'"></div>'});
    h+='</div><div class="heatleg"><span>moins</span><div class="hc"></div><div class="hc l1"></div><div class="hc l2"></div><div class="hc l4"></div><span>plus</span></div></div>';
  } else if(curstab==='streaks'){
    const sd=tasks.filter(t=>!t.archived).map(t=>({name:t.name,s:taskStreak(t),gcl:gc(t.group||'Général')})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,10);
    h+='<div class="slabel">streak par quête</div>';
    if(!sd.length)h+='<div style="color:var(--mut);font-size:12px;text-align:center;padding:16px;font-family:var(--mono)">Aucun streak actif.</div>';
    else sd.forEach(x=>{h+='<div class="srow2 '+x.gcl+'"><div class="srow2-bar"></div><span class="srow2-name">'+x.name+'</span><span class="srow2-val">🔥'+x.s+'j</span></div>'});
  } else {
    h+='<div class="slabel">succès ('+unlockedBadges.length+'/'+BADGE_DEFS.length+')</div><div class="badge-grid">';
    BADGE_DEFS.forEach(b=>{const u=unlockedBadges.includes(b.id);h+='<div class="badge '+(u?'unlocked':'locked')+'"><div class="badge-icon">'+b.icon+'</div><div class="badge-name">'+b.name+'</div><div class="badge-desc">'+b.desc+'</div></div>'});
    h+='</div>';
  }
  const top=[...tasks].filter(t=>!t.archived).sort((a,b)=>calcPts(b)-calcPts(a)).slice(0,5);
  if(top.length&&curstab!=='badges'){h+='<div class="slabel" style="margin-top:4px">top quêtes</div>';top.forEach(t=>{const gcl=gc(t.group||'Général');h+='<div class="ti '+gcl+'" style="cursor:default"><div class="tibody"><div class="tiname">'+t.name+'</div><div class="tags"><span class="tag tpts">'+calcPts(t)+' XP</span>'+(t.duration?'<span class="tag ttime">'+t.duration+'m</span>':'')+'<span class="tag tdiff">'+t.difficulty+'</span></div></div></div>'})}
  return h;
}

// ── RENDER ─────────────────────────────────────────────
function render(){
  renderHeader();
  let c='';
  if(curtab==='today')c=renderToday();
  else if(curtab==='week')c=renderWeek();
  else if(curtab==='month')c=renderMonth();
  else if(curtab==='stats')c=renderStats();

// ── ACTIONS ────────────────────────────────────────────
function toggle(day,id){
  const k=day+'_'+id,was=!!comps[k];comps[k]=!was;
  const t=tasks.find(t=>t.id===id);
  if(!was&&t){
    if(t.exclusiveGroup){tasks.forEach(o=>{if(o.id!==id&&o.exclusiveGroup===t.exclusiveGroup)delete comps[day+'_'+o.id]})}
    const chk=document.getElementById('ck'+id);if(chk){chk.classList.add('pop');setTimeout(()=>chk.classList.remove('pop'),300)}
    const streak=getStreak(),mul=getStreakMul(streak).mul,rep=isRep(t,day),pts=calcPts(t,rep,mul),xpb=totalXP()-pts;
    notif(rep?'+'+pts+' XP (-20%)':'+'+pts+' XP');
    if(getLvl(totalXP())>getLvl(xpb))setTimeout(()=>notif('⚡ LEVEL UP ! Niv.'+getLvl(totalXP())+' — '+getRankInfo(getLvl(totalXP())).name,'bonus'),700);
    // Journée parfaite ?
    const dt=tasksForDay(day);
    if(dt.length>0&&dt.every(t=>donOn(t,day))){setTimeout(()=>{notif('⚡ JOURNÉE PARFAITE !','perfect');launchConfetti()},300)}
    setTimeout(checkBadges,400);
  }
  persist();render();
}
function toggleSub(day,tid,sid){
  const k=day+'_'+tid+'_'+sid,was=!!subcomps[k];subcomps[k]=!was;
  if(!was){const streak=getStreak(),mul=getStreakMul(streak).mul,t=tasks.find(t=>t.id===tid),st=t&&(t.subtasks||[]).find(s=>s.id===sid);if(st)notif('+'+Math.round((st.pts||5)*mul)+' XP');setTimeout(checkBadges,400)}
  persist();render();
}
function incCnt(day,id,goal,pts,bp){const k=day+'_'+id,prev=counters[k]||0;counters[k]=prev+1;if(goal>0&&prev+1===goal){notif('🎯 OBJECTIF ! +'+bp+' XP bonus','bonus');launchConfetti()}else notif('+'+pts+' XP');setTimeout(checkBadges,400);persist();render()}
function decCnt(day,id){const k=day+'_'+id;if((counters[k]||0)>0){counters[k]--;if(!counters[k])delete counters[k]}persist();render()}
function archTask(id){tasks=tasks.map(t=>t.id===id?{...t,archived:true}:t);persist();render();notif('⊘ Archivée')}
function unarch(id){tasks=tasks.map(t=>t.id===id?{...t,archived:false}:t);persist();render();notif('↺ Restaurée')}

// ── DRAG & DROP ────────────────────────────────────────
function dgs(e,id){dragSrc=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dgo(e,id){e.preventDefault();document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over'));if(dragSrc!==id)e.currentTarget.classList.add('drag-over')}
function dgd(e,el){
  e.preventDefault();document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over','dragging'));
  if(!dragSrc)return;
  const grpEl=el.closest('.grpwrap');if(!grpEl)return;
  const grp=grpEl.querySelector('.grptitle').dataset.g;
  const grpT=tasks.filter(t=>(t.group||'Général')===grp&&!t.archived);
  const si=grpT.findIndex(t=>t.id===dragSrc);
  const ckEl=el.querySelector('[id^="ck"]');if(!ckEl){dragSrc=null;return}
  const tid=parseInt(ckEl.id.replace('ck',''));const ti=grpT.findIndex(t=>t.id===tid);
  if(si<0||ti<0||si===ti){dragSrc=null;return}
  grpT.forEach((t,i)=>{t.order=i});const[m]=grpT.splice(si,1);grpT.splice(ti,0,m);grpT.forEach((t,i)=>{const task=tasks.find(tt=>tt.id===t.id);if(task)task.order=i});
  dragSrc=null;persist();render();
}
function dge(){dragSrc=null;document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over','dragging'))}

function notif(msg,type){const el=document.getElementById('notif');el.textContent=msg;el.className='notif'+(type?' '+type:'');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2400)}

  const div=document.createElement('div');div.className='sti-edit-row';div.id='subrow'+i;
  div.innerHTML='<input class="finput" style="flex:1;margin:0" id="sn'+i+'" placeholder="Sous-tâche…">'
    +'<input class="finput" style="width:58px;margin:0" id="sp'+i+'" type="number" min="1" max="200" value="5">'
    +'<button onclick="document.getElementById(\'subrow'+i+'\').remove()" style="background:none;border:none;color:var(--red);font-size:16px;padding:4px 6px">✕</button>';
  list.appendChild(div);
}
function getSubsFromForm(){
  const list=document.getElementById('subslist');if(!list)return[];
  const subs=[];let i=0;
  list.querySelectorAll('.sti-edit-row').forEach(row=>{const ni=row.querySelector('[id^="sn"]'),pi=row.querySelector('[id^="sp"]');if(ni&&ni.value.trim())subs.push({id:i++,name:ni.value.trim(),pts:parseInt(pi&&pi.value)||5})});
  return subs;
}
function uprev(){
  const dur=parseInt(document.getElementById('fd')&&document.getElementById('fd').value||0)||0;
  const diff=(document.getElementById('fdi')&&document.getElementById('fdi').value)||'normal';
  const prio=(document.getElementById('fpr')&&document.getElementById('fpr').value)||'normale';
  const isCtr=document.getElementById('fctr')&&document.getElementById('fctr').checked;
  let pts;if(isCtr){const pu=Math.max(5,Math.round((dur||15)/15)*5);pts=Math.round(pu*(DIFFS[diff]||1)*(PRIOS[prio]||1))}else{const b=dur?Math.max(10,Math.round(dur/15)*10):10;pts=Math.round(b*(DIFFS[diff]||1)*(PRIOS[prio]||1))}
  const el=document.getElementById('pprev');if(el)el.textContent=pts;
}
function togCtr(){const c=document.getElementById('fctr')&&document.getElementById('fctr').checked;const co=document.getElementById('ctrOpt'),ro=document.getElementById('repOpt');if(co)co.style.display=c?'block':'none';if(ro)ro.style.display=c?'none':'block';uprev()}
function togRep(){const c=document.getElementById('frep')&&document.getElementById('frep').checked;const m=document.getElementById('malOpt');if(m)m.style.display=c?'block':'none'}
function togdate(){
  const unit=document.getElementById('freunit')&&document.getElementById('freunit').value;
  const l=document.getElementById('fdlbl');if(l)l.textContent=unit==='aucune'?'date':'date de début';
  const wk=document.getElementById('wkendOpt');if(wk)wk.style.display=unit!=='aucune'?'block':'none';
  uprev();
}
function togWeekend(){const c=document.getElementById('fnowknd')&&document.getElementById('fnowknd').checked;const m=document.getElementById('wkendMode');if(m)m.style.display=c?'block':'none'}
function getRecurStr(){
  const unit=document.getElementById('freunit')&&document.getElementById('freunit').value;
  if(!unit||unit==='aucune')return 'aucune';
  const num=parseInt(document.getElementById('frenum')&&document.getElementById('frenum').value)||1;
  return num+unit;
}

function openAdd(){showAdvanced=false;document.getElementById('mtitle').textContent='nouvelle quête';document.getElementById('mbody').innerHTML=fHTML(null)+'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">Annuler</button><button class="btn btnok" onclick="saveTask(null)">Créer ↗</button></div>';document.getElementById('moverlay').classList.add('open');togdate();uprev();setTimeout(()=>{const el=document.getElementById('fn');if(el)el.focus()},150)}
function openEdit(id){const t=tasks.find(t=>t.id===id);if(!t)return;showAdvanced=true;document.getElementById('mtitle').textContent='modifier quête';document.getElementById('mbody').innerHTML=fHTML(t)+'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">Annuler</button><button class="btn btnok" onclick="saveTask('+id+')">Modifier ↗</button></div>';document.getElementById('moverlay').classList.add('open');togdate();uprev()}

function saveTask(editId){
  const name=(document.getElementById('fn')&&document.getElementById('fn').value||'').trim();if(!name){notif('⚠ Nom requis','warn');return}
  const dur=parseInt(document.getElementById('fd')&&document.getElementById('fd').value)||0;
  const diff=(document.getElementById('fdi')&&document.getElementById('fdi').value)||'normal';
  const prio=(document.getElementById('fpr')&&document.getElementById('fpr').value)||'normale';
  const recur=getRecurStr();
  const date=(document.getElementById('fda')&&document.getElementById('fda').value)||curDay;
  const group=((document.getElementById('fg')&&document.getElementById('fg').value)||'').trim()||'Général';
  const isCtr=(document.getElementById('fctr')&&document.getElementById('fctr').checked)||false;
  const counterGoal=isCtr?(parseInt(document.getElementById('fgoal')&&document.getElementById('fgoal').value)||0):0;
  const autoReport=!isCtr&&((document.getElementById('frep')&&document.getElementById('frep').checked)||false);
  const reportMalus=autoReport&&((document.getElementById('fmal')&&document.getElementById('fmal').checked)||false);
  const noWeekend=!isCtr&&recur!=='aucune'&&((document.getElementById('fnowknd')&&document.getElementById('fnowknd').checked)||false);
  const weekendMode=noWeekend?((document.getElementById('fwkmode')&&document.getElementById('fwkmode').value)||'report'):'none';
  const note=((document.getElementById('fnote')&&document.getElementById('fnote').value)||'').trim();
  const subtasks=isCtr?[]:getSubsFromForm();
  const exclusiveGroup=((document.getElementById('fexcl')&&document.getElementById('fexcl').value)||'').trim()||null;
  const data={name,group,duration:dur||null,difficulty:diff,priority:prio,recurrence:recur,scheduledDate:date,type:isCtr?'counter':'standard',counterGoal,autoReport,reportMalus,noWeekend,weekendMode,note,subtasks,exclusiveGroup};
  gc(group);
  if(editId)tasks=tasks.map(t=>t.id===editId?Object.assign({},t,data):t);
  else tasks.push(Object.assign({id:nid++},data));
  persist();closeModal();render();notif(editId?'✓ Modifiée':'✓ Quête créée');
}

function confirmDel(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  document.getElementById('mtitle').textContent='supprimer';
  document.getElementById('mbody').innerHTML='<div style="text-align:center;padding:10px 0"><div style="color:var(--txt);font-size:14px;margin-bottom:6px;font-weight:700">Supprimer</div><div style="color:var(--red);font-size:13px;margin-bottom:6px">'+t.name+'</div><div style="color:var(--mut);font-size:10px;font-family:var(--mono);margin-bottom:18px">// supprime aussi l\'historique</div><div class="btnrow"><button class="btn btncancel" onclick="closeModal()">Annuler</button><button class="btn btnred" onclick="delTask('+id+')">Supprimer</button></div></div>';
  document.getElementById('moverlay').classList.add('open');
}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);Object.keys(comps).forEach(k=>{if(k.endsWith('_'+id))delete comps[k]});Object.keys(counters).forEach(k=>{if(k.endsWith('_'+id))delete counters[k]});Object.keys(subcomps).forEach(k=>{const p=k.split('_');if(parseInt(p[p.length-2])===id)delete subcomps[k]});persist();closeModal();render();notif('✓ Supprimée')}

// ── TEMPLATES ──────────────────────────────────────────
function openTemplates(){
  document.getElementById('mtitle').textContent='templates';
  let h='';
  if(!templates.length)h='<div class="empty" style="padding:24px"><div class="emptycmd">no-templates</div>Aucun template.</div>';
  else templates.forEach((tpl,i)=>{h+='<div class="tpl-row"><div><div class="tpl-name">'+tpl.name+'</div><div class="tpl-sub">'+tpl.tasks.length+' quête(s) · utilisé '+(tpl.usedCount||0)+'×</div></div><div class="tpl-acts"><button class="tpl-btn apply" onclick="applyTemplate('+i+')">▶ Appliquer</button><button class="tpl-btn" onclick="delTemplate('+i+')">✕</button></div></div>'});
  h+='<div class="section-sep"></div><div class="slabel">créer depuis aujourd\'hui</div>'
    +'<label class="flbl">nom du template</label><input class="finput" id="tplname" placeholder="ex: Journée travail…">'
    +'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">Fermer</button><button class="btn btnok" onclick="saveTemplate()">Sauvegarder ↗</button></div>';
  document.getElementById('mbody').innerHTML=h;
  document.getElementById('moverlay').classList.add('open');
}
function saveTemplate(){const name=((document.getElementById('tplname')&&document.getElementById('tplname').value)||'').trim();if(!name){notif('⚠ Nom requis','warn');return}const todayTasks=tasksForDay(curDay);if(!todayTasks.length){notif('⚠ Aucune tâche aujourd\'hui','warn');return}templates.push({name,tasks:todayTasks.map(t=>Object.assign({},t)),usedCount:0,createdAt:tod()});persist();notif('✓ Template sauvegardé');openTemplates()}
function applyTemplate(i){const tpl=templates[i];if(!tpl)return;tpl.tasks.forEach(t=>{const nt=Object.assign({},t,{id:nid++,scheduledDate:curDay,archived:false});gc(nt.group||'Général');tasks.push(nt)});tpl.usedCount=(tpl.usedCount||0)+1;persist();closeModal();render();notif('✓ '+tpl.tasks.length+' quêtes ajoutées');setTimeout(checkBadges,400)}
function delTemplate(i){templates.splice(i,1);persist();openTemplates();notif('✓ Template supprimé')}

// ── EXPORT ─────────────────────────────────────────────
function openExport(){
  document.getElementById('mtitle').textContent='export — import';
  document.getElementById('mbody').innerHTML='<div class="export-box"><p>// Exporte tes données en JSON. Recommandé régulièrement !</p><button class="btn btnok" style="margin-bottom:0" onclick="exportData()">⬇ Télécharger la sauvegarde</button></div>'
    +'<div class="export-warn">⚠ L\'import écrase toutes les données actuelles.</div>'
    +'<div class="export-box"><p>// Restaure depuis un fichier .json</p><input type="file" accept=".json" onchange="importData(this.files[0])" class="finput" style="padding:6px"></div>'
    +'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">Fermer</button></div>';
  document.getElementById('moverlay').classList.add('open');
}

function closeModal(){document.getElementById('moverlay').classList.remove('open')}
function closeMif(e){if(e.target===document.getElementById('moverlay'))closeModal()}

// ── INIT ───────────────────────────────────────────────
load();curDay=tod();render();setTimeout(checkBadges,1200);
</script>
</body>
</html>
