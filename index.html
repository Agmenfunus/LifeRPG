<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifeRPG">
<title>LifeRPG</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--brd:#30363d;--txt:#e6edf3;--mut:#7d8590;--grn:#39d353;--grn2:#0f6e56;--gld:#f0c040;--blu:#58a6ff;--org:#f78166;--pur:#bc8cff;--red:#f85149;--fnt:'JetBrains Mono','Courier New',monospace}
body{font-family:var(--fnt);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
button{font-family:var(--fnt);cursor:pointer}
.gc0{--gc:#58a6ff;--gcbg:rgba(88,166,255,.12)}.gc1{--gc:#39d353;--gcbg:rgba(57,211,83,.12)}.gc2{--gc:#bc8cff;--gcbg:rgba(188,140,255,.12)}.gc3{--gc:#f78166;--gcbg:rgba(247,129,102,.12)}.gc4{--gc:#f0c040;--gcbg:rgba(240,192,64,.12)}.gc5{--gc:#ff7b72;--gcbg:rgba(255,123,114,.12)}.gc6{--gc:#79c0ff;--gcbg:rgba(121,192,255,.12)}.gc7{--gc:#56d364;--gcbg:rgba(86,211,100,.12)}
.hdr{background:var(--bg2);border-bottom:1px solid var(--brd);padding:10px 16px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.uname{color:var(--grn);font-size:12px;font-weight:700}.uname span{color:var(--mut);font-weight:400}
.hdate{color:var(--mut);font-size:11px}
.xp-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-bottom:4px}
.xp-lbl .lvl{color:var(--gld);font-weight:700}
.xpbar{background:var(--bg3);border-radius:2px;height:6px;overflow:hidden;margin-bottom:6px}
.xpfill{background:linear-gradient(90deg,var(--grn2),var(--grn));height:100%;border-radius:2px;transition:width .5s}
.srow{display:flex;gap:10px;font-size:11px;color:var(--mut)}
.mul-badge{background:rgba(240,192,64,.15);color:var(--gld);border:1px solid rgba(240,192,64,.3);border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--brd)}
.tab{flex:1;padding:10px 1px;text-align:center;font-size:10px;color:var(--mut);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--grn);border-bottom-color:var(--grn)}
.content{padding:12px 16px 90px;min-height:300px}
.daynav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dnbtn{background:none;border:1px solid var(--brd);color:var(--mut);font-size:13px;padding:5px 10px;border-radius:3px}.dnbtn:active{background:var(--bg3)}
.daytitle{font-size:13px;font-weight:700;color:var(--txt);text-align:center}
.todaytag{background:var(--grn2);color:var(--grn);font-size:9px;padding:2px 5px;border-radius:2px;margin-left:4px}
.progbox{background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:10px 12px;margin-bottom:12px}
.progtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progcount{font-size:20px;font-weight:700;color:var(--grn)}.progcount small{font-size:12px;color:var(--mut);font-weight:400}
.progpts{text-align:right}.progptsval{font-size:18px;font-weight:700;color:var(--gld)}.progptslbl{font-size:10px;color:var(--mut)}
.progtrack{background:var(--bg3);border-radius:2px;height:4px;overflow:hidden}
.progfill{background:linear-gradient(90deg,var(--grn2),var(--grn));height:100%;border-radius:2px;transition:width .4s}
.grpwrap{margin-bottom:12px}
.grptitle{font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:4px;background:var(--gcbg);color:var(--gc);border-left:3px solid var(--gc);cursor:pointer;user-select:none;margin-bottom:0}
.grp-arrow{font-size:9px;transition:transform .25s;display:inline-block;margin-left:4px}
.grp-body{overflow:hidden;transition:max-height .3s ease;padding-top:6px}
.ti{background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:9px 9px 9px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:7px;cursor:pointer;transition:background .1s;border-left:3px solid var(--gc,var(--brd))}
.ti:active{background:var(--bg3)}.ti.done{opacity:.45}.ti.done .tiname{text-decoration:line-through;color:var(--mut)}
.ti.overdue{border-left:3px solid var(--red)!important}.ti.hasmalus{border-left:3px solid var(--org)!important}
.ti.archived{opacity:.3;border-style:dashed}
.subtask-wrap{padding:3px 0 3px 26px}
.sti{background:var(--bg3);border:1px solid var(--brd);border-radius:3px;padding:6px 9px;margin-bottom:3px;display:flex;align-items:center;gap:7px;cursor:pointer}
.sti:active{opacity:.7}.sti.done .stiname{text-decoration:line-through;color:var(--mut)}
.schk{width:14px;height:14px;border:1px solid var(--mut);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--grn)}
.sti.done .schk{background:var(--grn2);border-color:var(--grn)}
.stiname{font-size:12px;color:var(--txt);flex:1}
.sti-pts{font-size:10px;color:var(--gld)}
.task-streak{font-size:10px;color:var(--org);font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}
.chk{width:17px;height:17px;border:1px solid var(--mut);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:11px;color:var(--grn);transition:all .15s}
.ti.done .chk{background:var(--grn2);border-color:var(--grn)}
.chk.pop{animation:pop .25s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
.chk-counter{min-width:36px;height:24px;border:1px solid var(--mut);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700;color:var(--gld);background:rgba(240,192,64,.08);padding:0 5px;white-space:nowrap}
.chk-counter.reached{background:rgba(57,211,83,.15);color:var(--grn);border-color:var(--grn)}
.tibody{flex:1;min-width:0}.tiname{font-size:13px;color:var(--txt);margin-bottom:4px;word-break:break-word}
.tinote{font-size:11px;color:var(--mut);margin-bottom:4px;line-height:1.4}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 5px;border-radius:2px}
.ttime{background:rgba(88,166,255,.12);color:var(--blu)}.tpts{background:rgba(240,192,64,.12);color:var(--gld)}
.tdiff{background:rgba(188,140,255,.12);color:var(--pur)}.trecur{background:rgba(57,211,83,.12);color:var(--grn)}
.tprio{background:rgba(247,129,102,.12);color:var(--org)}.tover{background:rgba(248,81,73,.12);color:var(--red)}
.tbonus{background:rgba(57,211,83,.12);color:var(--grn)}
.tiacts{display:flex;gap:2px;flex-shrink:0}
.abtn{background:none;border:none;font-size:13px;padding:4px;line-height:1}
.abtn.edit{color:var(--blu)}.abtn.del{color:var(--mut)}.abtn.arch{color:var(--pur)}
.drag-handle{color:var(--mut);font-size:12px;cursor:grab;padding:3px 1px;flex-shrink:0;margin-top:2px;opacity:.4}
.ti.dragging{opacity:.3;border-style:dashed}.ti.drag-over{border-top:2px solid var(--grn)!important}
.counter-row{display:flex;align-items:center;gap:6px;margin-top:7px}
.cnt-btn{background:var(--bg3);border:1px solid var(--brd);color:var(--txt);font-size:16px;width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.cnt-btn:active{background:var(--brd)}
.cnt-track{flex:1;background:var(--bg3);border-radius:2px;height:5px;overflow:hidden}
.cnt-fill{background:var(--gld);height:100%;border-radius:2px;transition:width .3s}.cnt-fill.done-fill{background:var(--grn)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.wday{background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:5px 3px;text-align:center;cursor:pointer;min-height:54px;transition:all .15s}
.wday.wtoday{border-color:var(--grn)}.wday.wsel{background:var(--bg3);border-color:var(--blu)}
.wday-lbl{font-size:8px;color:var(--mut);margin-bottom:2px}.wday-num{font-size:12px;font-weight:700;margin-bottom:3px}
.wday.wtoday .wday-num{color:var(--grn)}
.wday-bar{width:80%;margin:0 auto 2px;background:var(--bg3);border-radius:1px;height:3px;overflow:hidden}
.wday-bar-fill{background:var(--grn2);height:100%;border-radius:1px}.wday-bar-fill.wfull{background:var(--grn)}
.wday-pts{font-size:8px;color:var(--gld)}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.month-day-lbl{font-size:9px;color:var(--mut);text-align:center;padding:4px 0}
.mday{background:var(--bg2);border:1px solid var(--brd);border-radius:3px;padding:4px 3px;text-align:center;cursor:pointer;min-height:44px;transition:all .15s}
.mday.mtoday{border-color:var(--grn)}.mday.msel{background:var(--bg3);border-color:var(--blu)}
.mday.mfuture{opacity:.35}.mday.mempty{opacity:.2}
.mday-num{font-size:11px;font-weight:700;margin-bottom:2px}.mday.mtoday .mday-num{color:var(--grn)}
.mday-bar{width:80%;margin:0 auto 2px;background:var(--bg3);border-radius:1px;height:2px;overflow:hidden}
.mday-pts{font-size:8px;color:var(--gld)}
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.badge{background:var(--bg2);border:1px solid var(--brd);border-radius:6px;padding:10px 6px;text-align:center}
.badge.unlocked{border-color:var(--gld);background:rgba(240,192,64,.06)}.badge.locked{opacity:.3;filter:grayscale(.8)}
.badge-icon{font-size:22px;margin-bottom:3px}.badge-name{font-size:10px;font-weight:700;color:var(--txt);margin-bottom:2px}
.badge-desc{font-size:9px;color:var(--mut);line-height:1.3}.badge.unlocked .badge-name{color:var(--gld)}
.tpl-row{background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.tpl-name{font-size:13px;color:var(--txt);font-weight:700}.tpl-sub{font-size:10px;color:var(--mut);margin-top:2px}
.tpl-acts{display:flex;gap:6px}
.tpl-btn{background:none;border:1px solid var(--brd);color:var(--mut);font-size:11px;padding:4px 8px;border-radius:3px}
.tpl-btn.apply{color:var(--grn);border-color:var(--grn)}.tpl-btn:active{opacity:.7}
.empty{text-align:center;padding:40px 20px;color:var(--mut);font-size:12px}
.emptycmd{color:var(--grn);font-size:14px;margin-bottom:8px}
.fab{position:fixed;bottom:24px;right:16px;width:52px;height:52px;background:var(--grn);color:var(--bg);border:none;border-radius:50%;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(57,211,83,.35);z-index:50;transition:transform .1s}
.fab:active{transform:scale(.92)}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:flex-end}
.moverlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--brd);border-radius:12px 12px 0 0;padding:20px 16px 36px;width:100%;max-height:92vh;overflow-y:auto}
.mtitle{color:var(--grn);font-size:14px;font-weight:700;margin-bottom:16px}.mtitle::before{content:'$ ';color:var(--mut)}
.flbl{font-size:11px;color:var(--mut);margin-bottom:4px;display:block}.flbl::before{content:'// '}
.finput{width:100%;background:var(--bg3);border:1px solid var(--brd);color:var(--txt);font-family:var(--fnt);font-size:13px;padding:9px 10px;border-radius:4px;outline:none;-webkit-appearance:none;margin-bottom:11px}
.finput:focus{border-color:var(--grn)}
textarea.finput{resize:none;min-height:55px;line-height:1.5}
.frow{display:flex;gap:8px}.frow .fld{flex:1}
.ptspreview{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:8px 10px;font-size:11px;color:var(--mut);margin-bottom:14px}
.ptspreview span{color:var(--gld);font-weight:700}
.btnrow{display:flex;gap:8px;margin-top:2px}
.btn{flex:1;padding:11px;font-family:var(--fnt);font-size:13px;border-radius:4px;font-weight:700;border:none}
.btnok{background:var(--grn);color:var(--bg)}.btncancel{background:var(--bg3);color:var(--mut);border:1px solid var(--brd)!important}
.btnred{background:rgba(248,81,73,.15);color:var(--red);border:1px solid var(--red)!important}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;padding:9px 10px;background:var(--bg3);border:1px solid var(--brd);border-radius:4px}
.toggle-lbl{font-size:12px;color:var(--txt)}.toggle-sub{font-size:10px;color:var(--mut);margin-top:2px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--bg);border:1px solid var(--brd);border-radius:11px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:var(--mut);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--grn2);border-color:var(--grn)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:var(--grn)}
.section-sep{height:1px;background:var(--brd);margin:14px 0 12px}
.fsect{font-size:10px;color:var(--pur);margin-bottom:10px;letter-spacing:.5px}.fsect::before{content:'>> '}
.sti-edit-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.scard{background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:12px}
.scardlbl{font-size:10px;color:var(--mut);margin-bottom:4px}.scardlbl::before{content:'// '}
.scardval{font-size:22px;font-weight:700}
.rankbanner{background:var(--bg2);border:1px solid var(--gld);border-radius:4px;padding:12px;text-align:center;margin-bottom:12px}
.rankname{color:var(--gld);font-size:20px;font-weight:700}.ranksub{color:var(--mut);font-size:11px;margin-top:3px}
.slabel{font-size:10px;color:var(--mut);margin-bottom:8px}.slabel::before{content:'// '}
.stabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.stab{padding:4px 7px;font-size:10px;color:var(--mut);border:1px solid var(--brd);border-radius:3px;background:none}
.stab.on{color:var(--grn);border-color:var(--grn)}
.chartbox{background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:12px;margin-bottom:12px}
.chartbars{display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:4px}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.barfill{width:100%;background:var(--bg3);border-radius:2px 2px 0 0;min-height:3px}
.barfill.cur{background:var(--grn)}.barfill.act{background:var(--grn2)}
.barlbl{font-size:9px;color:var(--mut)}.barv{font-size:9px;color:var(--mut);min-height:12px}
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.hc{aspect-ratio:1;border-radius:2px;background:var(--bg3)}
.hc.l1{background:rgba(57,211,83,.2)}.hc.l2{background:rgba(57,211,83,.45)}.hc.l3{background:rgba(57,211,83,.7)}.hc.l4{background:var(--grn)}
.heatleg{display:flex;gap:6px;align-items:center;font-size:10px;color:var(--mut)}
.heatleg .hc{width:12px;height:12px;aspect-ratio:unset}
.srow2{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--brd);border-radius:4px;padding:8px 12px;margin-bottom:4px}
.srow2-bar{width:3px;height:20px;flex-shrink:0;background:var(--gc,var(--mut));border-radius:2px;margin-right:10px}
.srow2-name{font-size:12px;color:var(--txt);flex:1}.srow2-val{font-size:12px;font-weight:700;color:var(--org)}
.export-box{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:12px;margin-bottom:10px}
.export-box p{font-size:11px;color:var(--mut);margin-bottom:10px;line-height:1.5}
.export-warn{background:rgba(248,81,73,.07);border:1px solid rgba(248,81,73,.25);border-radius:4px;padding:8px 10px;font-size:11px;color:var(--red);margin-bottom:10px;line-height:1.5}
.notif{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--grn);color:var(--bg);padding:8px 18px;border-radius:4px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center}
.notif.show{opacity:1}.notif.warn{background:var(--org)}.notif.bonus{background:var(--gld);color:#000}
.badge-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--bg2);border:2px solid var(--gld);border-radius:12px;padding:24px 32px;text-align:center;z-index:300;opacity:0;transition:all .35s;pointer-events:none}
.badge-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.bp-icon{font-size:46px;margin-bottom:8px}.bp-title{color:var(--gld);font-size:14px;font-weight:700;margin-bottom:4px}.bp-name{color:var(--txt);font-size:12px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top"><div class="uname">user[pro]<span>@life.RPG</span> $</div><div class="hdate" id="hdate"></div></div>
    <div class="xp-lbl"><span class="lvl" id="lvltxt">LVL 1 — Novice</span><span id="xptxt">0 / 500 XP</span></div>
    <div class="xpbar"><div class="xpfill" id="xpfill" style="width:0%"></div></div>
    <div class="srow">
      <span>🔥 <b style="color:var(--org)" id="sstreak">0</b>j</span>
      <span id="mulbadge"></span>
      <span>★ <b style="color:var(--gld)" id="stotal">0</b> XP</span>
      <span>🛡 <b style="color:var(--blu)" id="sday">0</b> auj.</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="sw('today')">quêtes</button>
    <button class="tab" onclick="sw('week')">sem.</button>
    <button class="tab" onclick="sw('month')">mois</button>
    <button class="tab" onclick="sw('stats')">stats</button>
    <button class="tab" onclick="sw('manage')">gérer</button>
  </div>
  <div class="content" id="content"></div>
</div>
<button class="fab" id="fab" onclick="openAdd()">+</button>
<div class="moverlay" id="moverlay" onclick="closeMif(event)">
  <div class="modal"><div class="mtitle" id="mtitle"></div><div id="mbody"></div></div>
</div>
<div class="notif" id="notif"></div>
<div class="badge-popup" id="bpop">
  <div class="bp-icon" id="bpop-icon"></div>
  <div class="bp-title">Succès débloqué !</div>
  <div class="bp-name" id="bpop-name"></div>
</div>

<script>
function toggleCustomRecurrence() {
  const r = document.getElementById("fre").value;
  const box = document.getElementById("customRecurrence");

  if (box) {
    box.style.display = (r === "custom") ? "block" : "none";
  }
}

const DIFFS = {facile:1, normal:1.5, difficile:2, 'extrême':3};
const PRIOS = {basse:1, normale:1.2, haute:1.5, critique:2};
const RANKS = ['Novice','Apprenti','Explorateur','Guerrier','Champion','Héros','Légende','Maître'];
const XPL = 500, MALUS = 0.2;
const GCOLS = ['gc0','gc1','gc2','gc3','gc4','gc5','gc6','gc7'];
const SK = 'lrpg7';

const STREAK_MULS = [
  {min:0,  mul:1.0,  label:null},
  {min:3,  mul:1.1,  label:'×1.1'},
  {min:7,  mul:1.25, label:'×1.25'},
  {min:14, mul:1.5,  label:'×1.5'},
  {min:30, mul:1.75, label:'×1.75'},
  {min:60, mul:2.0,  label:'×2.0'},
];

const BADGE_DEFS = [
  {id:'first',   icon:'🌱', name:'Premier pas',      desc:'Compléter sa 1ère quête',         check:s=>s.totalDone>=1},

let tasks=[], comps={}, counters={}, subcomps={}, nid=1;
let curDay=tod(), curtab='today', curstab='semaine';
let gcMap={}, collapsed={}, templates=[], unlockedBadges=[], dragSrc=null;

// ── UTILS ──────────────────────────────────────────────
function tod(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}
function dstr(d,s){const dt=new Date(d+'T12:00:00');return s?dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'}):dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}
function gc(name){if(!gcMap[name]){gcMap[name]=GCOLS[Object.keys(gcMap).length%GCOLS.length]}return gcMap[name]}
function getStreakMul(s){let m=STREAK_MULS[0];for(const x of STREAK_MULS){if(s>=x.min)m=x;}return m}

// ── CALCULS ────────────────────────────────────────────
function calcPts(t,rep,mul){
  let p;
  if(t.type==='counter'){const pu=Math.max(5,Math.round(((t.duration||15))/15)*5);p=Math.round(pu*(DIFFS[t.difficulty]||1)*(PRIOS[t.priority]||1))}
  else{const b=t.duration?Math.max(10,Math.round(t.duration/15)*10):10;p=Math.round(b*(DIFFS[t.difficulty]||1)*(PRIOS[t.priority]||1))}
  if(rep&&t.reportMalus)p=Math.round(p*(1-MALUS));
  if(mul&&mul>1)p=Math.round(p*mul);
  return p;
}
function bonusPts(t){if(t.type!=='counter'||!t.counterGoal)return 0;return Math.round(calcPts(t)*t.counterGoal*0.5)}
function getLvl(xp){return Math.floor(xp/XPL)+1}
function getRank(l){return RANKS[Math.min(l-1,RANKS.length-1)]}
function isDone(day,id){return!!comps[day+'_'+id]}
function getCnt(day,id){return counters[day+'_'+id]||0}
function isSubDone(day,tid,sid){return!!subcomps[day+'_'+tid+'_'+sid]}
function rl(r){if(!r||r==='aucune')return '';if(r==='quotidien')return 'quotidien';if(r==='hebdo')return 'hebdo';if(r==='mensuel')return 'mensuel';if(r.endsWith('j'))return 'tous les '+r;return r}

// ── RÉCURRENCE & REPORT ────────────────────────────────
function wasOn(t,day){
 if (t.recurrence && t.recurrence.endsWith('w')) {
  const n = parseInt(t.recurrence);
  const d = Math.floor((new Date(day) - new Date(t.scheduledDate)) / 86400000);
  return d >= 0 && d % (n * 7) === 0;
}
``
  if(!t.scheduledDate||t.scheduledDate>day)return false;
  if(t.recurrence==='quotidien')return true;
  if(t.recurrence==='hebdo'){const d=Math.round((new Date(day+'T12:00:00')-new Date(t.scheduledDate+'T12:00:00'))/86400000);return d>=0&&d%7===0}
  if(t.recurrence==='mensuel'){const b=new Date(t.scheduledDate+'T12:00:00'),c=new Date(day+'T12:00:00');return b.getDate()===c.getDate()&&c>=b}
  if(t.recurrence&&t.recurrence.endsWith('j')&&t.recurrence!=='aucune'){const x=parseInt(t.recurrence);if(x>=2&&x<=6){const d=Math.round((new Date(day+'T12:00:00')-new Date(t.scheduledDate+'T12:00:00'))/86400000);return d>=0&&d%x===0}}
  return t.recurrence==='aucune'&&t.scheduledDate===day;
}
function donOn(t,day){return t.type==='counter'?getCnt(day,t.id)>=(t.counterGoal||1):isDone(day,t.id)}
function hasPast(t,day){
  if(!t.autoReport)return false;
  let d=new Date(day+'T12:00:00');d.setDate(d.getDate()-1);
  for(let i=0;i<60;i++){const ds=d.toISOString().slice(0,10);if(wasOn(t,ds))return !donOn(t,ds);d.setDate(d.getDate()-1)}
  return false;
}
function tasksForDay(day){
  return tasks.filter(t=>{
    if(t.archived||!t.scheduledDate||t.scheduledDate>day)return false;
    if(wasOn(t,day))return true;
    if(t.autoReport&&t.recurrence!=='aucune')return hasPast(t,day);
    if(t.recurrence==='aucune'&&t.scheduledDate<day&&t.autoReport){
      let d=new Date(t.scheduledDate+'T12:00:00'),end=new Date(day+'T12:00:00');
      while(d<end){d.setDate(d.getDate()+1);const ds=d.toISOString().slice(0,10);if(ds<=day&&donOn(t,ds))return false}
      return true;
    }
    return false;
  });
}
function isRep(t,day){if(!t.reportMalus)return false;return !wasOn(t,day)&&(hasPast(t,day)||(t.recurrence==='aucune'&&t.scheduledDate<day))}

// ── POINTS ─────────────────────────────────────────────
function dayPts(day){
  const mul=getStreakMul(getStreak()).mul;
  let p=0;
  tasks.forEach(t=>{
    if(t.type==='counter'){const c=getCnt(day,t.id);if(c>0){p+=calcPts(t,false,mul)*c;if(t.counterGoal&&c>=t.counterGoal)p+=bonusPts(t)}}
    else if(isDone(day,t.id))p+=calcPts(t,isRep(t,day),mul);
  });
  tasks.forEach(t=>(t.subtasks||[]).forEach(st=>{if(isSubDone(day,t.id,st.id))p+=Math.round((st.pts||5)*mul)}));
  return Math.round(p);
}
function totalXP(){
  const mul=getStreakMul(getStreak()).mul;let xp=0;
  Object.keys(comps).forEach(k=>{if(!comps[k])return;const parts=k.split('_');const id=parseInt(parts[parts.length-1]);const day=parts.slice(0,-1).join('_');const t=tasks.find(t=>t.id===id&&t.type!=='counter');if(t)xp+=calcPts(t,isRep(t,day),mul)});
  Object.keys(counters).forEach(k=>{const c=counters[k];if(!c)return;const id=parseInt(k.split('_').pop());const t=tasks.find(t=>t.id===id&&t.type==='counter');if(t){xp+=calcPts(t,false,mul)*c;if(t.counterGoal&&c>=t.counterGoal)xp+=bonusPts(t)}});
  Object.keys(subcomps).forEach(k=>{if(!subcomps[k])return;const parts=k.split('_');const sid=parseInt(parts[parts.length-1]);const tid=parseInt(parts[parts.length-2]);const t=tasks.find(t=>t.id===tid);const st=t&&(t.subtasks||[]).find(s=>s.id===sid);if(st)xp+=Math.round((st.pts||5)*mul)});
  return Math.round(xp);
}
function getStreak(){
  let s=0;const today=tod();let d=new Date(today+'T12:00:00');
  for(let i=0;i<365;i++){const ds=d.toISOString().slice(0,10);const dt=tasksForDay(ds);if(dt.length===0){d.setDate(d.getDate()-1);continue}const done=dt.filter(t=>donOn(t,ds)).length;if(done===dt.length){s++;d.setDate(d.getDate()-1)}else{if(ds===today)d.setDate(d.getDate()-1);else break}}
  return s;
}
function taskStreak(t){
  let s=0;let d=new Date(tod()+'T12:00:00');
  for(let i=0;i<365;i++){const ds=d.toISOString().slice(0,10);if(wasOn(t,ds)){if(donOn(t,ds))s++;else if(ds===tod()){d.setDate(d.getDate()-1);continue}else break}d.setDate(d.getDate()-1)}
  return s;
}

// ── BADGES ─────────────────────────────────────────────
function getBadgeState(){
  const today=tod(),totalDone=Object.values(comps).filter(Boolean).length;
  const xp=totalXP(),streak=getStreak(),lvl=getLvl(xp);
  const subDone=Object.values(subcomps).filter(Boolean).length;
  let maxDayCnt=0;Object.keys(counters).forEach(k=>{if(counters[k]>maxDayCnt)maxDayCnt=counters[k]});
  let hadPerfect=false;
  for(let i=0;i<90;i++){const d=new Date(today+'T12:00:00');d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const dt=tasksForDay(ds);if(dt.length>0&&dt.every(t=>donOn(t,ds))){hadPerfect=true;break}}
  const usedTpl=templates.some(t=>t.usedCount>0);
  return {totalDone,xp,streak,lvl,subDone,maxDayCnt,hadPerfect,usedTpl};
}
function checkBadges(){
  const state=getBadgeState();const newBadges=[];
  BADGE_DEFS.forEach(b=>{if(!unlockedBadges.includes(b.id)&&b.check(state)){unlockedBadges.push(b.id);newBadges.push(b)}});
  if(newBadges.length){let i=0;const show=()=>{if(i>=newBadges.length)return;const b=newBadges[i++];document.getElementById('bpop-icon').textContent=b.icon;document.getElementById('bpop-name').textContent=b.name;const el=document.getElementById('bpop');el.classList.add('show');setTimeout(()=>{el.classList.remove('show');setTimeout(show,500)},2500)};setTimeout(show,500);persist()}
}

// ── PERSISTANCE ────────────────────────────────────────
function persist(){try{localStorage.setItem(SK,JSON.stringify({tasks,comps,counters,subcomps,nid,gcMap,collapsed,templates,unlockedBadges}))}catch(e){notif('⚠ Erreur sauvegarde','warn')}}
function load(){
  try{
    const keys=[SK,'lrpg6','lrpg5','lrpg4','liferPG_v3','liferPG_v2'];
    let s=null;for(const k of keys){s=localStorage.getItem(k);if(s)break}
    if(s){const d=JSON.parse(s);tasks=d.tasks||[];comps=d.comps||{};counters=d.counters||{};subcomps=d.subcomps||{};nid=d.nid||1;gcMap=d.gcMap||d.grpColorMap||{};collapsed=d.collapsed||d.collapsedGroups||{};templates=d.templates||[];unlockedBadges=d.unlockedBadges||[];persist()}
  }catch(e){}
}
function exportData(){const blob=new Blob([JSON.stringify({tasks,comps,counters,subcomps,nid,gcMap,collapsed,templates,unlockedBadges,date:tod()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='liferPG_'+tod()+'.json';a.click();notif('✓ Sauvegarde téléchargée !')}
function importData(file){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.tasks)throw 0;tasks=d.tasks||[];comps=d.comps||{};counters=d.counters||{};subcomps=d.subcomps||{};nid=d.nid||1;gcMap=d.gcMap||{};collapsed=d.collapsed||{};templates=d.templates||[];unlockedBadges=d.unlockedBadges||[];persist();closeModal();render();notif('✓ Données restaurées !')}catch{notif('⚠ Fichier invalide','warn')}};r.readAsText(file)}

// ── RENDER TODAY ───────────────────────────────────────
function renderToday(){
  const day=curDay,today=tod(),isT=day===today;
  const dt=tasksForDay(day),done=dt.filter(t=>donOn(t,day));
  const pts=dayPts(day),pct=dt.length?Math.round(done.length/dt.length*100):0;
  const streak=getStreak(),mul=getStreakMul(streak).mul;
  const groups={};dt.forEach(t=>{const g=t.group||'Général';if(!groups[g])groups[g]=[];groups[g].push(t)});
  Object.keys(groups).forEach(g=>gc(g));
  const sg=Object.keys(groups).sort((a,b)=>(groups[a][0].grpOrder||99)-(groups[b][0].grpOrder||99));

  let h='<div class="daynav">'
    +'<button class="dnbtn" onclick="chDay(-1)">&lt;</button>'
    +'<div class="daytitle">'+dstr(day)+(isT?'<span class="todaytag">*today</span>':'')+'</div>'
    +'<button class="dnbtn" onclick="chDay(1)">&gt;</button>'
    +'</div>';
  if(mul>1)h+='<div style="background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.2);border-radius:4px;padding:6px 10px;font-size:11px;color:var(--gld);margin-bottom:10px;text-align:center">⚡ Multiplicateur <b>'+getStreakMul(streak).label+'</b> actif — '+streak+' jours de streak !</div>';
  h+='<div class="progbox"><div class="progtop">'
    +'<div><div class="progcount">'+done.length+'<small>/'+dt.length+'</small></div><div class="slabel" style="margin:0;font-size:10px">complétées</div></div>'
    +'<div class="progpts"><div class="progptsval">'+pts+'</div><div class="progptslbl">// pts aujourd\'hui</div></div>'
    +'</div><div class="progtrack"><div class="progfill" style="width:'+pct+'%"></div></div></div>';

  if(dt.length===0){
    h+='<div class="empty"><div class="emptycmd">$ no-quests-found</div>Aucune tâche pour ce jour.<br>Appuie sur + pour en créer une.</div>';
  } else {
    sg.forEach(function(g){
      const gcl=gc(g),gt=groups[g].sort((a,b)=>(a.order||99)-(b.order||99));
      const gd=gt.filter(t=>donOn(t,day)).length,col=!!collapsed[g];
      h+='<div class="grpwrap '+gcl+'">'
        +'<div class="grptitle" data-g="'+g.replace(/"/g,'&quot;')+'" onclick="toggleGrp(this)">'
        +'<span>&gt; '+g+'</span>'
        +'<span>['+gd+'/'+gt.length+'] <span class="grp-arrow" style="transform:rotate('+(col?'-90':'0')+'deg)">▼</span></span>'
        +'</div>'
        +'<div class="grp-body" style="max-height:'+(col?'0':'4000px')+';'+(col?'padding-top:0':'')+'">';
      gt.forEach(t=>{h+=t.type==='counter'?renderCtr(t,day,gcl):renderStd(t,day,today,gcl)});
      h+='</div></div>';
    });
  }
  return h;
}

function renderStd(t,day,today,gcl){
  const d=donOn(t,day),rep=isRep(t,day),streak=getStreak(),mul=getStreakMul(streak).mul;
  const ov=!d&&(!wasOn(t,day)&&hasPast(t,day)||(t.recurrence==='aucune'&&t.scheduledDate<today&&t.autoReport));
  const pts=calcPts(t,rep&&ov,mul),ts=taskStreak(t);
  let daysSince='';
  if(ov&&!d){let dd=new Date(day+'T12:00:00');dd.setDate(dd.getDate()-1);for(let i=1;i<60;i++){const ds=dd.toISOString().slice(0,10);if(wasOn(t,ds)){daysSince=i;break}dd.setDate(dd.getDate()-1)}}
  const subs=t.subtasks||[],subsDone=subs.filter(s=>isSubDone(day,t.id,s.id)).length;
  let h='<div class="ti '+gcl+(d?' done':'')+(ov&&t.reportMalus?' hasmalus':ov?' overdue':'')+'"'
    +' draggable="true" ondragstart="dgs(event,'+t.id+')" ondragover="dgo(event,'+t.id+')" ondrop="dgd(event,this)" ondragend="dge()"'
    +' onclick="toggle(\''+day+'\','+t.id+')">'
    +'<span class="drag-handle" onclick="event.stopPropagation()">⠿</span>'
    +'<div class="chk" id="ck'+t.id+'">'+(d?'✓':'')+'</div>'
    +'<div class="tibody">'
    +'<div class="tiname">'+t.name+(subs.length?' <span style="font-size:10px;color:var(--mut)">('+subsDone+'/'+subs.length+')</span>':'')+'</div>'
    +(t.note?'<div class="tinote">'+t.note+'</div>':'')
    +'<div class="tags">'
    +(t.duration?'<span class="tag ttime">⏱'+t.duration+'m</span>':'')
    +'<span class="tag tpts">★'+pts+(mul>1?' '+getStreakMul(streak).label:'')+(rep&&ov?' -20%':'')+'</span>'
    +'<span class="tag tdiff">'+t.difficulty+'</span>'
    +(t.priority!=='normale'?'<span class="tag tprio">'+t.priority+'</span>':'')
    +(rl(t.recurrence)?'<span class="tag trecur">↻'+rl(t.recurrence)+'</span>':'')
    +(ov?'<span class="tag tover">⚠+'+(daysSince||'?')+'j</span>':'')
    +'</div></div>'
    +(ts>=2?'<span class="task-streak">🔥'+ts+'</span>':'')
    +'<div class="tiacts" onclick="event.stopPropagation()">'
    +'<button class="abtn edit" onclick="openEdit('+t.id+')">✎</button>'
    +'<button class="abtn arch" onclick="archTask('+t.id+')">⊘</button>'
    +'<button class="abtn del" onclick="confirmDel('+t.id+')">✕</button>'
    +'</div></div>';
  if(subs.length){
    h+='<div class="subtask-wrap">';
    subs.forEach(s=>{
      const sd=isSubDone(day,t.id,s.id);
      h+='<div class="sti'+(sd?' done':'')+'" onclick="toggleSub(\''+day+'\','+t.id+','+s.id+')">'
        +'<div class="schk">'+(sd?'✓':'')+'</div>'
        +'<span class="stiname">'+s.name+'</span>'
        +'<span class="sti-pts">★'+Math.round((s.pts||5)*mul)+'</span>'
        +'</div>';
    });
    h+='</div>';
  }
  return h;
}

function renderCtr(t,day,gcl){
  const cnt=getCnt(day,t.id),goal=t.counterGoal||0,reached=goal>0&&cnt>=goal;
  const pct=goal>0?Math.min(100,Math.round(cnt/goal*100)):0;
  const streak=getStreak(),mul=getStreakMul(streak).mul;
  const pts=calcPts(t,false,mul),bp=bonusPts(t),ts=taskStreak(t);
  return '<div class="ti '+gcl+'" style="flex-direction:column;gap:6px;cursor:default"'
    +' draggable="true" ondragstart="dgs(event,'+t.id+')" ondragover="dgo(event,'+t.id+')" ondrop="dgd(event,this)" ondragend="dge()">'
    +'<div style="display:flex;align-items:flex-start;gap:8px;width:100%">'
    +'<span class="drag-handle">⠿</span>'
    +'<div class="chk-counter'+(reached?' reached':'')+'">'+( goal>0?cnt+'/'+goal:cnt)+'</div>'
    +'<div class="tibody"><div class="tiname">'+t.name+'</div>'
    +(t.note?'<div class="tinote">'+t.note+'</div>':'')
    +'<div class="tags">'
    +(t.duration?'<span class="tag ttime">⏱'+t.duration+'m</span>':'')
    +'<span class="tag tpts">★'+pts+'/u'+(mul>1?' '+getStreakMul(streak).label:'')+'</span>'
    +(goal>0?'<span class="tag tbonus">🎯+'+bp+' si '+goal+'</span>':'')
    +'<span class="tag tdiff">'+t.difficulty+'</span>'
    +(rl(t.recurrence)?'<span class="tag trecur">↻'+rl(t.recurrence)+'</span>':'')
    +(reached?'<span class="tag tbonus">✓ objectif!</span>':'')
    +'</div></div>'
    +(ts>=2?'<span class="task-streak">🔥'+ts+'</span>':'')
    +'<div class="tiacts" onclick="event.stopPropagation()">'
    +'<button class="abtn edit" onclick="openEdit('+t.id+')">✎</button>'
    +'<button class="abtn arch" onclick="archTask('+t.id+')">⊘</button>'
    +'<button class="abtn del" onclick="confirmDel('+t.id+')">✕</button>'
    +'</div></div>'
    +'<div class="counter-row" onclick="event.stopPropagation()">'
    +'<button class="cnt-btn" onclick="decCnt(\''+day+'\','+t.id+')">−</button>'
    +(goal>0?'<div class="cnt-track"><div class="cnt-fill'+(reached?' done-fill':'')+'" style="width:'+pct+'%"></div></div>':'<div style="flex:1"></div>')
    +'<button class="cnt-btn" onclick="incCnt(\''+day+'\','+t.id+','+goal+','+pts+','+bp+')">+</button>'
    +'</div></div>';
}

// ── RENDER WEEK ────────────────────────────────────────
function renderWeek(){
  const ref=new Date(curDay+'T12:00:00'),dow=ref.getDay();
  const mon=new Date(ref);mon.setDate(ref.getDate()-(dow===0?6:dow-1));
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().slice(0,10)});
  const today=tod();
  let h='<div class="daynav">'
    +'<button class="dnbtn" onclick="chWeek(-7)">&lt;</button>'
    +'<div class="daytitle" style="font-size:11px">'+dstr(days[0],true)+' → '+dstr(days[6],true)+'</div>'
    +'<button class="dnbtn" onclick="chWeek(7)">&gt;</button>'
    +'</div><div class="week-grid">';
  days.forEach(day=>{
    const dt=tasksForDay(day),done=dt.filter(t=>donOn(t,day)).length;
    const pct=dt.length?Math.round(done/dt.length*100):0,pts=dayPts(day);
    const d=new Date(day+'T12:00:00');
    h+='<div class="wday'+(day===today?' wtoday':'')+(day===curDay?' wsel':'')+'" onclick="selDay(\''+day+'\')">'
      +'<div class="wday-lbl">'+d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,2)+'</div>'
      +'<div class="wday-num">'+d.getDate()+'</div>'
      +'<div class="wday-bar"><div class="wday-bar-fill'+(pct>=100?' wfull':'')+'" style="width:'+pct+'%"></div></div>'
      +'<div class="wday-pts">'+(pts>0?'★'+pts:'')+'</div>'
      +'</div>';
  });
  h+='</div><div class="slabel">'+dstr(curDay)+'</div>';
  const dayT=tasksForDay(curDay);
  if(!dayT.length)h+='<div class="empty" style="padding:20px"><div class="emptycmd" style="font-size:13px">$ no-quests</div>Aucune tâche.</div>';
  else dayT.forEach(t=>{
    const gcl=gc(t.group||'Général'),d=donOn(t,curDay);
    if(t.type==='counter'){
      const cnt=getCnt(curDay,t.id),goal=t.counterGoal||0,reached=goal>0&&cnt>=goal;
      h+='<div class="ti '+gcl+'" style="cursor:default">'
        +'<div class="chk-counter'+(reached?' reached':'')+'">'+( goal>0?cnt+'/'+goal:cnt)+'</div>'
        +'<div class="tibody"><div class="tiname">'+t.name+'</div></div>'
        +'<div class="tiacts"><button class="cnt-btn" style="width:28px;height:28px;font-size:14px" onclick="decCnt(\''+curDay+'\','+t.id+')">−</button>'
        +'<button class="cnt-btn" style="width:28px;height:28px;font-size:14px" onclick="incCnt(\''+curDay+'\','+t.id+','+goal+','+calcPts(t)+','+bonusPts(t)+')">+</button></div></div>';
    } else {
      h+='<div class="ti '+gcl+(d?' done':'')+'" onclick="toggle(\''+curDay+'\','+t.id+')">'
        +'<div class="chk">'+(d?'✓':'')+'</div>'
        +'<div class="tibody"><div class="tiname">'+t.name+'</div></div></div>';
    }
  });
  return h;
}

// ── RENDER MONTH ───────────────────────────────────────
function renderMonth(){
  const ref=new Date(curDay+'T12:00:00'),year=ref.getFullYear(),month=ref.getMonth();
  const firstDay=new Date(year,month,1),lastDay=new Date(year,month+1,0),today=tod();
  const monthLabel=ref.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  let startOffset=firstDay.getDay()-1;if(startOffset<0)startOffset=6;
  let h='<div class="daynav">'
    +'<button class="dnbtn" onclick="chMonth(-1)">&lt;</button>'
    +'<div class="daytitle" style="font-size:12px">'+monthLabel+'</div>'
    +'<button class="dnbtn" onclick="chMonth(1)">&gt;</button>'
    +'</div><div class="month-grid">';
  ['Lu','Ma','Me','Je','Ve','Sa','Di'].forEach(d=>{h+='<div class="month-day-lbl">'+d+'</div>'});
  for(let i=0;i<startOffset;i++)h+='<div></div>';
  for(let day=1;day<=lastDay.getDate();day++){
    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const dt=tasksForDay(ds),done=dt.filter(t=>donOn(t,ds)).length;
    const pts=dayPts(ds),pct=dt.length?done/dt.length:0,isFuture=ds>today,isEmpty=dt.length===0;
    const bc=pct>=1?'var(--grn)':pct>=.5?'var(--gld)':pct>0?'var(--org)':'var(--bg3)';
    h+='<div class="mday'+(ds===today?' mtoday':'')+(ds===curDay?' msel':'')+(isFuture?' mfuture':'')+(isEmpty?' mempty':'')+'" onclick="selDay(\''+ds+'\')">'
      +'<div class="mday-num">'+day+'</div>'
      +'<div class="mday-bar"><div style="width:'+Math.round(pct*100)+'%;background:'+bc+';height:100%;border-radius:1px"></div></div>'
      +'<div class="mday-pts">'+(pts>0&&!isFuture?'★'+pts:'')+'</div>'
      +'</div>';
  }
  h+='</div><div style="display:flex;gap:10px;font-size:10px;color:var(--mut);margin-bottom:12px;flex-wrap:wrap"><span style="color:var(--grn)">■ 100%</span><span style="color:var(--gld)">■ 50%+</span><span style="color:var(--org)">■ en cours</span></div>';
  h+='<div class="slabel">'+dstr(curDay)+'</div>';
  const dayT=tasksForDay(curDay);
  if(!dayT.length)h+='<div class="empty" style="padding:16px"><div class="emptycmd" style="font-size:12px">$ no-quests</div></div>';
  else dayT.forEach(t=>{
    const gcl=gc(t.group||'Général'),d=donOn(t,curDay);
    h+='<div class="ti '+gcl+(d?' done':'')+'" onclick="toggle(\''+curDay+'\','+t.id+')">'
      +'<div class="chk">'+(d?'✓':'')+'</div>'
      +'<div class="tibody"><div class="tiname">'+t.name+'</div></div></div>';
  });
  return h;
}

// ── RENDER STATS ───────────────────────────────────────
function renderStats(){
  const xp=totalXP(),lvl=getLvl(xp),xpInLvl=xp%XPL,streak=getStreak(),today=tod(),mul=getStreakMul(streak);
  const l7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const ds=d.toISOString().slice(0,10);return{ds,pts:dayPts(ds),lbl:d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,2)}});
  const mp=Math.max(...l7.map(x=>x.pts),1),wp=l7.reduce((a,b)=>a+b.pts,0);
  const doneAll=Object.values(comps).filter(Boolean).length+Object.values(counters).reduce((a,b)=>a+b,0);
  const l28=Array.from({length:28},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(27-i));const ds=d.toISOString().slice(0,10);const dt=tasksForDay(ds);const done=dt.filter(t=>donOn(t,ds)).length;const p=dt.length?done/dt.length:0;return p===0?'':p<.33?'l1':p<.66?'l2':p<1?'l3':'l4'});
  let h='<div class="rankbanner"><div class="rankname">'+getRank(lvl)+'</div><div class="ranksub">// niveau '+lvl+' · '+xp+' XP · '+Math.round(xpInLvl/XPL*100)+'% → LVL '+(lvl+1)+(mul.mul>1?' · multiplicateur '+mul.label:'')+'</div></div>'
    +'<div class="sgrid">'
    +'<div class="scard"><div class="scardlbl">streak</div><div class="scardval" style="color:var(--org)">'+streak+'j</div></div>'
    +'<div class="scard"><div class="scardlbl">XP total</div><div class="scardval" style="color:var(--gld)">'+xp+'</div></div>'
    +'<div class="scard"><div class="scardlbl">cette semaine</div><div class="scardval" style="color:var(--blu)">'+wp+'</div></div>'
    +'<div class="scard"><div class="scardlbl">actions</div><div class="scardval">'+doneAll+'</div></div>'
    +'</div>'
    +'<div class="slabel">graphiques</div>'
    +'<div class="stabs">'
    +'<button class="stab'+(curstab==='semaine'?' on':'')+'" onclick="swtab(\'semaine\')">7j</button>'
    +'<button class="stab'+(curstab==='mois'?' on':'')+'" onclick="swtab(\'mois\')">28j</button>'
    +'<button class="stab'+(curstab==='streaks'?' on':'')+'" onclick="swtab(\'streaks\')">streaks</button>'
    +'<button class="stab'+(curstab==='badges'?' on':'')+'" onclick="swtab(\'badges\')">badges</button>'
    +'</div>';
  if(curstab==='semaine'){
    h+='<div class="chartbox"><div class="slabel" style="margin-bottom:8px">points / jour</div><div class="chartbars">';
    l7.forEach(x=>{const hp=Math.round(x.pts/mp*72),isT=x.ds===today;h+='<div class="barcol"><div class="barv">'+(x.pts>0?x.pts:'')+'</div><div class="barfill'+(isT?' cur':x.pts>0?' act':'')+'" style="height:'+hp+'px"></div><div class="barlbl">'+x.lbl+'</div></div>'});
    h+='</div></div>';
  } else if(curstab==='mois'){
    h+='<div class="chartbox"><div class="slabel" style="margin-bottom:8px">activité 28 jours</div><div class="heatmap">';
    l28.forEach(c=>{h+='<div class="hc '+c+'"></div>'});
    h+='</div><div class="heatleg"><span>moins</span><div class="hc"></div><div class="hc l1"></div><div class="hc l2"></div><div class="hc l4"></div><span>plus</span></div></div>';
  } else if(curstab==='streaks'){
    const sd=tasks.filter(t=>!t.archived).map(t=>({name:t.name,s:taskStreak(t),gcl:gc(t.group||'Général')})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,10);
    h+='<div class="slabel">streak par quête</div>';
    if(!sd.length)h+='<div style="color:var(--mut);font-size:12px;text-align:center;padding:16px">Aucun streak actif.</div>';
    else sd.forEach(x=>{h+='<div class="srow2 '+x.gcl+'"><div class="srow2-bar"></div><span class="srow2-name">'+x.name+'</span><span class="srow2-val">🔥'+x.s+'j</span></div>'});
  } else {
    const unlocked=unlockedBadges.length;
    h+='<div class="slabel">succès ('+unlocked+'/'+BADGE_DEFS.length+')</div><div class="badge-grid">';
    BADGE_DEFS.forEach(b=>{
      const u=unlockedBadges.includes(b.id);
      h+='<div class="badge '+(u?'unlocked':'locked')+'">'
        +'<div class="badge-icon">'+b.icon+'</div>'
        +'<div class="badge-name">'+b.name+'</div>'
        +'<div class="badge-desc">'+b.desc+'</div>'
        +'</div>';
    });
    h+='</div>';
  }
  const top=[...tasks].filter(t=>!t.archived).sort((a,b)=>calcPts(b)-calcPts(a)).slice(0,5);
  if(top.length&&curstab!=='badges'){h+='<div class="slabel" style="margin-top:4px">top quêtes</div>';top.forEach(t=>{const gcl=gc(t.group||'Général');h+='<div class="ti '+gcl+'" style="cursor:default"><div class="tibody"><div class="tiname">'+t.name+'</div><div class="tags"><span class="tag tpts">★'+calcPts(t)+'</span>'+(t.duration?'<span class="tag ttime">'+t.duration+'m</span>':'')+'<span class="tag tdiff">'+t.difficulty+'</span></div></div></div>'})}
  return h;
}

// ── RENDER MANAGE ──────────────────────────────────────

  const active=tasks.filter(t=>!t.archived),arch=tasks.filter(t=>t.archived);
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div class="slabel" style="margin:0">actives ('+active.length+')</div>'
    +'<div style="display:flex;gap:6px">'
    +'<button onclick="openTemplates()" style="background:none;border:1px solid var(--brd);color:var(--mut);font-family:var(--fnt);font-size:10px;padding:4px 7px;border-radius:3px">📋 templates</button>'
    +'<button onclick="openExport()" style="background:none;border:1px solid var(--brd);color:var(--mut);font-family:var(--fnt);font-size:10px;padding:4px 7px;border-radius:3px">⬇ export</button>'
    +'</div></div>';
  if(!active.length)h+='<div class="empty"><div class="emptycmd">$ no-quests</div>Appuie sur + pour créer ta première quête.</div>';

    const gcl=gc(t.group||'Général'),subs=t.subtasks||[];
    h+='<div class="ti '+gcl+'" style="cursor:default"><div class="tibody"><div class="tiname">'+t.name+(subs.length?' <span style="font-size:10px;color:var(--mut)">('+subs.length+' s-tâches)</span>':'')+'</div>'
      +(t.note?'<div class="tinote">'+t.note+'</div>':'')
      +'<div class="tags">'
      +(t.duration?'<span class="tag ttime">⏱'+t.duration+'m</span>':'')
      +'<span class="tag tpts">★'+calcPts(t)+'</span>'
      +'<span class="tag tdiff">'+t.difficulty+'</span>'
      +'<span class="tag tprio">'+t.priority+'</span>'
      +(t.type==='counter'?'<span class="tag tbonus">×ctr'+(t.counterGoal?'('+t.counterGoal+')':'')+'</span>':'')
      +(t.autoReport?'<span class="tag tover">↺'+(t.reportMalus?'-20%':'')+'</span>':'')
      +(rl(t.recurrence)?'<span class="tag trecur">↻'+rl(t.recurrence)+'</span>':'<span class="tag ttime">'+(t.scheduledDate||'')+'</span>')
      +'</div></div>'
      +'<div class="tiacts">'
      +'<button class="abtn edit" onclick="openEdit('+t.id+')">✎</button>'
      +'<button class="abtn arch" onclick="archTask('+t.id+')">⊘</button>'
      +'<button class="abtn del" onclick="confirmDel('+t.id+')">✕</button>'
      +'</div></div>';
  });
  if(arch.length){
    h+='<div class="slabel" style="margin-top:14px">archivées ('+arch.length+')</div>';
    arch.forEach(t=>{const gcl=gc(t.group||'Général');h+='<div class="ti '+gcl+' archived" style="cursor:default"><div class="tibody"><div class="tiname">'+t.name+'</div></div><div class="tiacts"><button class="abtn" style="color:var(--grn)" onclick="unarch('+t.id+')">↺</button><button class="abtn del" onclick="confirmDel('+t.id+')">✕</button></div></div>'});
  }
  return h;
}

// ── RENDER ─────────────────────────────────────────────
function render(){
  renderHeader();
  let c='';
  if(curtab==='today')c=renderToday();
  else if(curtab==='week')c=renderWeek();
  else if(curtab==='month')c=renderMonth();
  else if(curtab==='stats')c=renderStats();
  else c=renderManage();
  document.getElementById('content').innerHTML=c;
}

// ── ACTIONS ────────────────────────────────────────────
function toggle(day,id){
  const k=day+'_'+id,was=!!comps[k];comps[k]=!was;
  const t=tasks.find(t=>t.id===id);
  if(!was&&t){
    const chk=document.getElementById('ck'+id);if(chk){chk.classList.add('pop');setTimeout(()=>chk.classList.remove('pop'),300)}
    const streak=getStreak(),mul=getStreakMul(streak).mul,rep=isRep(t,day),pts=calcPts(t,rep,mul),xpb=totalXP()-pts;
    notif(rep?'+'+pts+'pts ★ (-20%)':'+'+pts+' pts ★');
    if(getLvl(totalXP())>getLvl(xpb))setTimeout(()=>notif('🎉 LEVEL UP ! Niv.'+getLvl(totalXP())+' — '+getRank(getLvl(totalXP())),'bonus'),700);
    setTimeout(checkBadges,400);
  }
  persist();render();
}
function toggleSub(day,tid,sid){
  const k=day+'_'+tid+'_'+sid,was=!!subcomps[k];subcomps[k]=!was;
  if(!was){const streak=getStreak(),mul=getStreakMul(streak).mul,t=tasks.find(t=>t.id===tid),st=t&&(t.subtasks||[]).find(s=>s.id===sid);if(st)notif('+'+Math.round((st.pts||5)*mul)+'pts ★');setTimeout(checkBadges,400)}
  persist();render();
}
function incCnt(day,id,goal,pts,bp){const k=day+'_'+id,prev=counters[k]||0;counters[k]=prev+1;if(goal>0&&prev+1===goal)notif('🎯 Objectif ! +'+bp+'pts bonus','bonus');else notif('+'+pts+' pts ★');setTimeout(checkBadges,400);persist();render()}
function decCnt(day,id){const k=day+'_'+id;if((counters[k]||0)>0){counters[k]--;if(!counters[k])delete counters[k]}persist();render()}
function archTask(id){tasks=tasks.map(t=>t.id===id?{...t,archived:true}:t);persist();render();notif('⊘ Archivée')}
function unarch(id){tasks=tasks.map(t=>t.id===id?{...t,archived:false}:t);persist();render();notif('↺ Restaurée')}

// ── DRAG & DROP ────────────────────────────────────────
function dgs(e,id){dragSrc=id;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dgo(e,id){e.preventDefault();document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over'));if(dragSrc!==id)e.currentTarget.classList.add('drag-over')}
function dgd(e,el){
  e.preventDefault();document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over','dragging'));
  if(!dragSrc)return;
  const grpEl=el.closest('.grpwrap');if(!grpEl)return;
  const grp=grpEl.querySelector('.grptitle').dataset.g;
  const grpT=tasks.filter(t=>(t.group||'Général')===grp&&!t.archived);
  const si=grpT.findIndex(t=>t.id===dragSrc);
  const ckEl=el.querySelector('[id^="ck"]');if(!ckEl){dragSrc=null;return}
  const tid=parseInt(ckEl.id.replace('ck',''));
  const ti=grpT.findIndex(t=>t.id===tid);
  if(si<0||ti<0||si===ti){dragSrc=null;return}
  grpT.forEach((t,i)=>{t.order=i});const[m]=grpT.splice(si,1);grpT.splice(ti,0,m);grpT.forEach((t,i)=>{const task=tasks.find(tt=>tt.id===t.id);if(task)task.order=i});
  dragSrc=null;persist();render();
}
function dge(){dragSrc=null;document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over','dragging'))}

function notif(msg,type){const el=document.getElementById('notif');el.textContent=msg;el.className='notif'+(type?' '+type:'');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2400)}

    +'<div id="ctrOpt" style="display:'+(isCtr?'block':'none')+'">'
    +'<label class="flbl">objectif (0 = sans limite)</label>'
    +'<input class="finput" id="fgoal" type="number" min="0" max="999" value="'+(d.counterGoal||0)+'"></div>'
    +'<div id="repOpt" style="display:'+(isCtr?'none':'block')+'">'
    +'<div class="toggle-row" onclick="togRep()"><div><div class="toggle-lbl">Reporter si non faite</div><div class="toggle-sub">réapparaît le lendemain</div></div>'
    +'<label class="toggle" onclick="event.stopPropagation()"><input type="checkbox" id="frep" '+(d.autoReport?'checked':'')+' onchange="togRep()"><span class="toggle-slider"></span></label></div>'
    +'<div id="malOpt" style="display:'+(d.autoReport?'block':'none')+'">'
    +'<div class="toggle-row"><div><div class="toggle-lbl">Malus si reportée (-20%)</div><div class="toggle-sub">pénalité pour retard</div></div>'
    +'<label class="toggle"><input type="checkbox" id="fmal" '+(d.reportMalus?'checked':'')+'><span class="toggle-slider"></span></label></div></div>'
    +'<div class="section-sep"></div><div class="fsect">sous-tâches</div>'
    +'<div id="subslist">'+buildSubRows(subs)+'</div>'
    +'<button onclick="addSubField()" style="background:none;border:1px solid var(--brd);color:var(--mut);font-family:var(--fnt);font-size:11px;padding:6px 12px;border-radius:3px;width:100%;margin-bottom:11px">+ Ajouter une sous-tâche</button>'
    +'</div>'
    +'<div class="ptspreview">// valeur estimée : <span id="pprev">?</span> pts'+(isCtr?'/unité':'')+'</div>';
}

function addSubField(){
  const list=document.getElementById('subslist');if(!list)return;
  const i=editSubCount++;
  const div=document.createElement('div');div.className='sti-edit-row';div.id='subrow'+i;
  div.innerHTML='<input class="finput" style="flex:1;margin:0" id="sn'+i+'" placeholder="Sous-tâche...">'
    +'<input class="finput" style="width:60px;margin:0" id="sp'+i+'" type="number" min="1" max="200" value="5">'
    +'<button onclick="document.getElementById(\'subrow'+i+'\').remove()" style="background:none;border:none;color:var(--red);font-size:16px;padding:4px 6px">✕</button>';
  list.appendChild(div);
}

function getSubsFromForm(){
  const list=document.getElementById('subslist');if(!list)return[];
  const subs=[];let i=0;
  list.querySelectorAll('.sti-edit-row').forEach(row=>{
    const ni=row.querySelector('[id^="sn"]'),pi=row.querySelector('[id^="sp"]');
    if(ni&&ni.value.trim())subs.push({id:i++,name:ni.value.trim(),pts:parseInt(pi&&pi.value)||5});
  });
  return subs;
}

function uprev(){
  const dur=parseInt(document.getElementById('fd')&&document.getElementById('fd').value||0)||0;
  const diff=(document.getElementById('fdi')&&document.getElementById('fdi').value)||'normal';
  const prio=(document.getElementById('fpr')&&document.getElementById('fpr').value)||'normale';
  const isCtr=document.getElementById('fctr')&&document.getElementById('fctr').checked;
  let pts;
  if(isCtr){const pu=Math.max(5,Math.round((dur||15)/15)*5);pts=Math.round(pu*(DIFFS[diff]||1)*(PRIOS[prio]||1))}
  else{const b=dur?Math.max(10,Math.round(dur/15)*10):10;pts=Math.round(b*(DIFFS[diff]||1)*(PRIOS[prio]||1))}
  const el=document.getElementById('pprev');if(el)el.textContent=pts;
}
function togCtr(){const c=document.getElementById('fctr')&&document.getElementById('fctr').checked;const co=document.getElementById('ctrOpt'),ro=document.getElementById('repOpt');if(co)co.style.display=c?'block':'none';if(ro)ro.style.display=c?'none':'block';uprev()}
function togRep(){const c=document.getElementById('frep')&&document.getElementById('frep').checked;const m=document.getElementById('malOpt');if(m)m.style.display=c?'block':'none'}
function togdate(){const r=document.getElementById('fre')&&document.getElementById('fre').value,w=document.getElementById('fdw');if(w)w.style.display=r==='quotidien'?'none':'block';const l=document.getElementById('fdlbl');if(l)l.textContent=r==='aucune'?'date':'date de début';uprev()}

function openAdd(){document.getElementById('mtitle').textContent='add-quest';document.getElementById('mbody').innerHTML=fHTML(null)+'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">annuler</button><button class="btn btnok" onclick="saveTask(null)">créer ↗</button></div>';document.getElementById('moverlay').classList.add('open');togdate();uprev();setTimeout(()=>{const el=document.getElementById('fn');if(el)el.focus()},150)}
function openEdit(id){const t=tasks.find(t=>t.id===id);if(!t)return;document.getElementById('mtitle').textContent='edit-quest';document.getElementById('mbody').innerHTML=fHTML(t)+'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">annuler</button><button class="btn btnok" onclick="saveTask('+id+')">modifier ↗</button></div>';document.getElementById('moverlay').classList.add('open');togdate();uprev()}

function saveTask(editId){
  const name=(document.getElementById('fn')&&document.getElementById('fn').value||'').trim();
  if(!name){notif('⚠ nom requis !','warn');return}
  const dur=parseInt(document.getElementById('fd')&&document.getElementById('fd').value)||0;
  const diff=(document.getElementById('fdi')&&document.getElementById('fdi').value)||'normal';
  const prio=(document.getElementById('fpr')&&document.getElementById('fpr').value)||'normale';
  let recur = document.getElementById('fre').value;

if (recur === 'custom') {
  const n = parseInt(document.getElementById('frecN').value) || 1;
  const unit = document.getElementById('frecUnit').value;

  recur = n + unit;
}
  const date=(document.getElementById('fda')&&document.getElementById('fda').value)||curDay;
  const group=((document.getElementById('fg')&&document.getElementById('fg').value)||'').trim()||'Général';
  const isCtr=(document.getElementById('fctr')&&document.getElementById('fctr').checked)||false;
  const counterGoal=isCtr?(parseInt(document.getElementById('fgoal')&&document.getElementById('fgoal').value)||0):0;
  const autoReport=!isCtr&&((document.getElementById('frep')&&document.getElementById('frep').checked)||false);
  const reportMalus=autoReport&&((document.getElementById('fmal')&&document.getElementById('fmal').checked)||false);
  const note=((document.getElementById('fnote')&&document.getElementById('fnote').value)||'').trim();
  const subtasks=isCtr?[]:getSubsFromForm();
  const data={name,group,duration:dur||null,difficulty:diff,priority:prio,recurrence:recur,scheduledDate:recur==='quotidien'?tod():date,type:isCtr?'counter':'standard',counterGoal,autoReport,reportMalus,note,subtasks};
  gc(group);
  if(editId)tasks=tasks.map(t=>t.id===editId?Object.assign({},t,data):t);
  else tasks.push(Object.assign({id:nid++},data));
  persist();closeModal();render();notif(editId?'✓ modifiée !':'✓ créée !');
}

function confirmDel(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  document.getElementById('mtitle').textContent='supprimer';
  document.getElementById('mbody').innerHTML='<div style="text-align:center;padding:8px 0"><div style="color:var(--txt);font-size:13px;margin-bottom:16px">Supprimer <strong style="color:var(--red)">'+t.name+'</strong> ?<br><small style="color:var(--mut);font-size:11px">// supprime aussi l\'historique</small></div><div class="btnrow"><button class="btn btncancel" onclick="closeModal()">annuler</button><button class="btn btnred" onclick="delTask('+id+')">supprimer</button></div></div>';
  document.getElementById('moverlay').classList.add('open');
}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);Object.keys(comps).forEach(k=>{if(k.endsWith('_'+id))delete comps[k]});Object.keys(counters).forEach(k=>{if(k.endsWith('_'+id))delete counters[k]});Object.keys(subcomps).forEach(k=>{const p=k.split('_');if(parseInt(p[p.length-2])===id)delete subcomps[k]});persist();closeModal();render();notif('✓ supprimée')}

// ── TEMPLATES ──────────────────────────────────────────
function openTemplates(){
  document.getElementById('mtitle').textContent='templates';
  let h='';
  if(!templates.length)h='<div class="empty" style="padding:20px"><div class="emptycmd" style="font-size:12px">$ no-templates</div>Aucun template. Crée-en un ci-dessous.</div>';
  else templates.forEach((tpl,i)=>{
    h+='<div class="tpl-row"><div><div class="tpl-name">'+tpl.name+'</div><div class="tpl-sub">'+tpl.tasks.length+' quête(s) · utilisé '+( tpl.usedCount||0)+'×</div></div>'
      +'<div class="tpl-acts">'
      +'<button class="tpl-btn apply" onclick="applyTemplate('+i+')">▶ Appliquer</button>'
      +'<button class="tpl-btn" onclick="delTemplate('+i+')">✕</button>'
      +'</div></div>';
  });
  h+='<div class="section-sep"></div>'
    +'<div class="slabel">créer depuis les quêtes d\'aujourd\'hui</div>'
    +'<label class="flbl">nom du template</label>'
    +'<input class="finput" id="tplname" placeholder="ex: Journée travail, Weekend...">'
    +'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">fermer</button><button class="btn btnok" onclick="saveTemplate()">sauvegarder ↗</button></div>';
  document.getElementById('mbody').innerHTML=h;
  document.getElementById('moverlay').classList.add('open');
}
function saveTemplate(){
  const name=((document.getElementById('tplname')&&document.getElementById('tplname').value)||'').trim();
  if(!name){notif('⚠ nom requis','warn');return}
  const todayTasks=tasksForDay(curDay);
  if(!todayTasks.length){notif('⚠ Aucune tâche aujourd\'hui','warn');return}
  templates.push({name,tasks:todayTasks.map(t=>Object.assign({},t)),usedCount:0,createdAt:tod()});
  persist();notif('✓ Template sauvegardé !');openTemplates();
}
function applyTemplate(i){
  const tpl=templates[i];if(!tpl)return;
  tpl.tasks.forEach(t=>{const nt=Object.assign({},t,{id:nid++,scheduledDate:curDay,archived:false});gc(nt.group||'Général');tasks.push(nt)});
  tpl.usedCount=(tpl.usedCount||0)+1;
  persist();closeModal();render();notif('✓ '+tpl.tasks.length+' quêtes ajoutées !');setTimeout(checkBadges,400);
}
function delTemplate(i){templates.splice(i,1);persist();openTemplates();notif('✓ Template supprimé')}

// ── EXPORT / IMPORT ────────────────────────────────────
function openExport(){
  document.getElementById('mtitle').textContent='export-import';
  document.getElementById('mbody').innerHTML='<div class="export-box"><p>// Exporte tes données en JSON. Fais-le régulièrement !</p>'
    +'<button class="btn btnok" style="margin-bottom:0" onclick="exportData()">⬇ Télécharger la sauvegarde</button></div>'
    +'<div class="export-warn">⚠ L\'import écrase toutes tes données actuelles.</div>'
    +'<div class="export-box"><p>// Restaure depuis un fichier .json</p>'
    +'<input type="file" accept=".json" onchange="importData(this.files[0])" class="finput" style="padding:6px"></div>'
    +'<div class="btnrow"><button class="btn btncancel" onclick="closeModal()">fermer</button></div>';
  document.getElementById('moverlay').classList.add('open');
}

function closeModal(){document.getElementById('moverlay').classList.remove('open')}
function closeMif(e){if(e.target===document.getElementById('moverlay'))closeModal()}

// ── INIT ───────────────────────────────────────────────
load();curDay=tod();render();setTimeout(checkBadges,1000);
</script>
</body>
</html>
